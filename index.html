    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        amazon: {
                            DEFAULT: '#131921',
                            light: '#232f3e',
                            yellow: '#febd69',
                            orange: '#f90'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        pop: { '0%': { transform: 'scale(0.95)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; padding: 2px 6px; font-size: 11px; font-weight: 900; border: 2px solid white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e5e7eb; }
        .product-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); border-color: #febd69; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-4 { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Print Styles */
        @media print {
            body > *:not(#print-section) { display: none !important; }
            #print-section { display: block !important; position: absolute; top: 0; left: 0; width: 100%; color: black; background: white; padding: 20px; direction: rtl; }
            .no-print { display: none !important; }
        }
    </style>
</head>

                print: "طباعة", pending: "قيد الانتظار", accepted: "مقبول", rejected: "مرفوض", invoiceNo: "رقم القائمة",

            ku: {

                cart: "سەبەتە", emptyCart: "سەبەتەکەت بەتاڵە", addCart: "بۆ ناو سەبەتە", total: "کۆی گشتی", 
                checkout: "کڕین", currency: "د.ع", welcome: "بەخێربێیت بۆ", sub: "ملیۆنان کاڵا. گەیاندنی خێرا. باشترین نرخ.", 
                lang: "العربية", adminTitle: "بەڕێوەبردنی سیستەم", addProduct: "زیادکردنی کاڵای نوێ", pName: "ناوی کاڵا", 
                pPrice: "نرخ", pImg: "لینکی وێنە", pDesc: "وەسف", pCat: "بەش", publish: "بڵاوکردنەوە", 
                checkoutTitle: "زانیاری گەیاندن", cName: "ناوی تەواو", cAddress: "ناونیشانی تەواو", cNotes: "تێبینی بۆ گەیاندنکار", 
                confirmOrder: "تأکیدکردنەوەی داواکاری", successMsg: "داواکارییەکەت وەرگیرا! 🎉", successSub: "بەم زووانە پەیوەندیت پێوە دەکەین.", 
                backToHome: "گەڕانەوە بۆ فرۆشگا", addedToCart: "خرایە سەبەتەکەوە!", freeDelivery: "گەیاندنی خۆڕایی", 
                productDetails: "وردەکاری کاڵا", buyNow: "ئێستا بیکڕە", account: "هەژمار", outOfStock: "نەماوە",
                orders: "داواکارییەکان", sales: "فرۆشەکان", products: "کاڵاکان", accept: "بەڵێ (قبوڵکردن)", reject: "نەخێر (ڕەتکردنەوە)", 
                print: "چاپکردن", pending: "لە چاوەڕوانیدایە", accepted: "قبوڵکراو", rejected: "ڕەتکراوە", invoiceNo: "ژمارەی پسوڵە", 
                itemNo: "ژمارەی کاڵا", delete: "سڕینەوە", adminSearch: "گەڕان بەناو یان ژمارە...", totalSales: "کۆی فرۆشەکان",
                close: "داخستن"
            }
        };

        const App = () => {
            const [lang, setLang] = useState('ar');
            const [page, setPage] = useState('home');
            const [isAdmin, setIsAdmin] = useState(false);
            const [products, setProducts] = useState([]);
            const [orders, setOrders] = useState([]);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [search, setSearch] = useState('');
            const [activeCat, setActiveCat] = useState('الكل');
            const [selectedProduct, setSelectedProduct] = useState(null); 
            
            const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
            const [isSuccessOpen, setIsSuccessOpen] = useState(false);
            const [toastMsg, setToastMsg] = useState('');
            const [orderForm, setOrderForm] = useState({ name: '', address: '', notes: '' });

            // Admin states
            const [adminTab, setAdminTab] = useState('orders'); // orders, products, sales
            const [adminSearch, setAdminSearch] = useState('');
            const [newProduct, setNewProduct] = useState({ name: '', price: '', imageUrl: '', description: '', category: 'إلكترونيات' });
            const [printingOrder, setPrintingOrder] = useState(null);

            const t = TR[lang];
            let clickCount = useRef(0);
            let clickTimer = useRef(null);

            useEffect(() => {
                const pRef = db.ref('products');
                pRef.on('value', snap => {
                    const data = snap.val();
                    if (data) setProducts(Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse());
                    else setProducts([]);
                });

                const oRef = db.ref('orders');
                oRef.on('value', snap => {
                    const data = snap.val();
                    if (data) setOrders(Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse());
                    else setOrders([]);
                });

                return () => { pRef.off(); oRef.off(); };
            }, []);

            // 5 Clicks Login Logic
            const handleSecretLogin = () => {
                clickCount.current += 1;
                if (clickCount.current >= 5) {
                    clickCount.current = 0;
                    if (!isAdmin) {
                        const email = window.prompt("Email:");
                        if (email === "tafteshok@gmail.com") {
                            const password = window.prompt("Password:");
                            if (password === "224080") {
                                setIsAdmin(true);
                                setPage('admin');
                                showToast("بەخێربێیت بۆ پەناڵی ئەدمین");
                            } else alert("Password incorrect!");
                        }
                    } else {
                        setPage('admin');
                    }
                }
                clearTimeout(clickTimer.current);
                clickTimer.current = setTimeout(() => { clickCount.current = 0; }, 2000);
            };

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            const addToCart = (product) => {
                const exist = cart.find(x => x.id === product.id);
                if (exist) setCart(cart.map(x => x.id === product.id ? { ...exist, qty: exist.qty + 1 } : x));
                else setCart([...cart, { ...product, qty: 1 }]);
                showToast(t.addedToCart);
                setIsCartOpen(true);
            };

            const updateQty = (id, amount) => {
                const exist = cart.find(x => x.id === id);
                if (exist.qty === 1 && amount === -1) setCart(cart.filter(x => x.id !== id));
                else setCart(cart.map(x => x.id === id ? { ...exist, qty: exist.qty + amount } : x));
            };

            const cartTotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

            const handleOrderSubmit = (e) => {
                e.preventDefault();
                const invoiceId = 'INV-' + Math.floor(100000 + Math.random() * 900000);
                db.ref('orders').push({
                    invoiceId,
                    customer: orderForm,
                    items: cart,
                    total: cartTotal,
                    date: new Date().toISOString(),
                    status: 'pending' // pending, accepted, rejected
                });
                
                setIsCheckoutOpen(false);
                setIsCartOpen(false);
                setIsSuccessOpen(true);
                setCart([]);
                setOrderForm({ name: '', address: '', notes: '' });
            };

            // Smart Search for User
            const searchTerms = search.toLowerCase().trim().split(/\s+/);
            const filteredProducts = products.filter(p => {
                const matchCat = activeCat === 'الكل' || p.category === activeCat;
                const searchString = `${p.name} ${p.description || ''} ${p.sku || p.id}`.toLowerCase();
                const matchSearch = searchTerms.every(term => searchString.includes(term));
                return matchCat && matchSearch;
            });

            // Admin Functions
            const handleAddProduct = (e) => {
                e.preventDefault();
                const sku = 'ITM-' + Math.floor(1000 + Math.random() * 9000);
                db.ref('products').push({ ...newProduct, sku, price: Number(newProduct.price) });
                setNewProduct({ name: '', price: '', imageUrl: '', description: '', category: 'إلكترونيات' });
                showToast(lang === 'ku' ? "کاڵاکە زیادکرا" : "تمت إضافة المنتج");
            };

            const deleteProduct = (id) => {
                if(window.confirm("Are you sure?")) db.ref('products/' + id).remove();
            };

            const updateOrderStatus = (id, status) => {
                db.ref('orders/' + id).update({ status });
            };

            const handlePrint = (order) => {
                setPrintingOrder(order);
                setTimeout(() => { window.print(); setPrintingOrder(null); }, 500);
            };

            const renderStars = () => (
                <div className="flex items-center text-amazon-orange text-sm mb-1">
                    ★ ★ ★ ★ <span className="text-gray-300">★</span> 
                    <span className="text-blue-600 text-xs ml-1 font-normal">(128)</span>
                </div>
            );

            return (
                <div className={`flex flex-col min-h-screen ${lang === 'ku' ? 'text-right' : 'text-right'}`} dir="rtl">
                    {/* Print Container */}
                    <div id="print-section" className="hidden bg-white p-8">

                            <div className="max-w-3xl mx-auto border-2 border-gray-800 p-6 rounded-lg">

                                    <h2 className="text-xl font-bold">فاتورة مبيعات / پسوڵەی فرۆشتن</h2>

                                </div>
                                <div className="mb-6">
                                    <p><strong>{t.cName}:</strong> {printingOrder.customer.name}</p>
                                    <p><strong>{t.cAddress}:</strong> {printingOrder.customer.address}</p>
                                    <p><strong>التاريخ / بەروار:</strong> {new Date(printingOrder.date).toLocaleString('ar-IQ')}</p>
                                    {printingOrder.customer.notes && <p><strong>ملاحظات:</strong> {printingOrder.customer.notes}</p>}
                                </div>
                                <table className="w-full text-right border-collapse mb-6">
                                    <thead>
                                        <tr className="bg-gray-200">
                                            <th className="border border-gray-400 p-2">المنتج / کاڵا</th>
                                            <th className="border border-gray-400 p-2">{t.itemNo}</th>
                                            <th className="border border-gray-400 p-2">الكمية / بڕ</th>
                                            <th className="border border-gray-400 p-2">السعر / نرخ</th>
                                            <th className="border border-gray-400 p-2">المجموع / کۆ</th>
                                        </tr>
                                    </thead>

                                                <td className="border border-gray-400 p-2">{item.qty}</td>
                                                <td className="border border-gray-400 p-2">{item.price.toLocaleString()}</td>
                                                <td className="border border-gray-400 p-2">{(item.price * item.qty).toLocaleString()}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>

                    {/* Top Navbar */}
                    <header className="bg-amazon text-white sticky top-0 z-50 no-print">

                            <div onClick={() => setPage('home')} className="flex items-center gap-2 cursor-pointer border border-transparent hover:border-white p-1 rounded">
                                <span className="text-2xl font-black tracking-tighter text-amazon-orange">KE<span className="text-white font-bold">STORE</span></span>
                            </div>

                            <div className="flex-1 hidden md:flex h-11 rounded-md overflow-hidden bg-white group focus-within:ring-4 ring-amazon-orange/50 transition-shadow">
                                <select className="bg-gray-100 text-gray-700 px-3 text-sm border-none outline-none border-l border-gray-300 cursor-pointer hover:bg-gray-200 font-bold" dir="rtl">
                                    {CATEGORIES.map(c=><option key={c} value={c}>{c === 'الكل' ? (lang==='ku'?'هەمووی':'الكل') : c}</option>)}

                                <input type="text" placeholder={t.search} value={search} onChange={(e)=>setSearch(e.target.value)} className="flex-1 px-4 text-black outline-none" />
                                <button className="bg-amazon-yellow hover:bg-amazon-orange text-black px-6 transition-colors flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                                </button>
                            </div>

                            <div className="flex items-center gap-2 sm:gap-4">
                                <button onClick={() => setLang(lang === 'ar' ? 'ku' : 'ar')} className="flex items-center gap-1 font-bold text-sm hover:text-gray-300 border border-transparent hover:border-white p-2 rounded">
                                    🌐 {t.lang}
                                </button>

                                {isAdmin && (
                                    <div className="flex items-center gap-2">
                                        <span onClick={() => setPage(page === 'admin' ? 'home' : 'admin')} className="text-amazon-orange hover:text-white cursor-pointer ml-1 text-xl" title={t.adminTitle}>⚙️</span>
                                        <button onClick={() => { setIsAdmin(false); setPage('home'); }} className="text-xs text-red-400 hover:text-red-300 font-bold p-1 border border-transparent hover:border-white rounded">{t.logout}</button>

                                <div className="relative flex items-center cursor-pointer border border-transparent hover:border-white p-1 rounded" onClick={() => setIsCartOpen(true)}>

                                        <span className="absolute top-1 left-1/2 transform -translate-x-1/2 text-amazon-orange font-bold text-sm bg-amazon w-6 h-5 text-center flex justify-center items-center rounded-full mt-1">
                                            {cart.reduce((a,c)=>a+c.qty,0)}
                                        </span>
                                    </div>
                                    <span className="font-bold hidden sm:block mt-auto text-sm">{t.cart}</span>
                                </div>
                            </div>
                        </div>

                        <div className="md:hidden px-4 pb-3">
                            <div className="flex h-11 rounded-md overflow-hidden bg-white shadow-inner focus-within:ring-2 ring-amazon-orange">
                                <input type="text" placeholder={t.search} value={search} onChange={(e)=>setSearch(e.target.value)} className="flex-1 px-4 text-black outline-none" />
                                <button className="bg-amazon-yellow text-black px-5"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
                            </div>
                        </div>

                                    {cat === 'الكل' ? (lang === 'ku' ? 'هەمووی' : 'الكل') : cat}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="flex-1 w-full max-w-[1500px] mx-auto animate-fade-in pb-12 no-print">
                        {page === 'home' ? (

                                {/* Adjusted Hero Section Padding & Margin */}
                                <div className="w-full h-[300px] sm:h-[400px] bg-gradient-to-r from-amazon-light to-blue-900 relative mb-12">
                                    <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=2070')] bg-cover bg-center mix-blend-overlay opacity-50"></div>
                                    <div className="absolute inset-0 bg-gradient-to-t from-gray-100 to-transparent"></div>
                                    {/* Moved Text Down with pt-16 sm:pt-32 */}
                                    <div className="relative z-10 px-6 pt-16 sm:pt-32 text-white max-w-xl mx-auto text-center drop-shadow-2xl">
                                        <h1 className="text-4xl sm:text-6xl font-black mb-4">{t.welcome} <span className="text-amazon-yellow">KESTORE</span></h1>

                                    </div>
                                </div>

                                <div className="px-4 -mt-20 sm:-mt-28 relative z-20">
                                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6">
                                        {filteredProducts.length === 0 ? (
                                            <div className="col-span-full text-center py-20 bg-white rounded-xl shadow-lg">
                                                <h3 className="font-bold text-2xl text-gray-400">لا توجد منتجات / کاڵا نەدۆزرایەوە</h3>
                                            </div>
                                        ) : (
                                            filteredProducts.map(p => (
                                                <div key={p.id} onClick={() => setSelectedProduct(p)} className="product-card bg-white cursor-pointer rounded-xl overflow-hidden flex flex-col group relative shadow-sm">
                                                    {/* Increased image container height and decreased padding for larger images */}
                                                    <div className="w-full h-[200px] sm:h-[240px] relative bg-white flex items-center justify-center overflow-hidden border-b border-gray-100">
                                                        <img src={p.imageUrl} className="absolute inset-0 w-full h-full object-contain p-2 group-hover:scale-105 transition-transform duration-500" onError={(e)=>e.target.src='https://via.placeholder.com/400'} />
                                                    </div>
                                                    <div className="p-4 flex-1 flex flex-col bg-white">
                                                        <span className="text-xs text-gray-400 mb-1">{p.sku}</span>
                                                        <h3 className="font-bold text-base text-gray-900 mb-2 line-clamp-2 group-hover:text-amazon-orange transition-colors">{p.name}</h3>
                                                        {renderStars()}
                                                        <div className="mt-2 mb-3">
                                                            <span className="text-2xl font-black text-gray-900">{Number(p.price).toLocaleString()} {t.currency}</span>
                                                        </div>
                                                        <button onClick={(e) => { e.stopPropagation(); addToCart(p); }} className="mt-auto w-full bg-amazon-yellow hover:bg-amazon-orange text-black font-bold py-2 rounded-lg transition-colors shadow-md hover:shadow-lg">
                                                            {t.addCart}
                                                        </button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        ) : page === 'admin' && isAdmin ? (
                            <div className="p-4 sm:p-8">
                                <h2 className="text-3xl font-black mb-6 text-amazon-light">{t.adminTitle}</h2>
                                
                                <div className="flex gap-2 mb-6 overflow-x-auto hide-scroll">
                                    <button onClick={()=>setAdminTab('orders')} className={`px-6 py-2 rounded-full font-bold transition-colors whitespace-nowrap ${adminTab==='orders'?'bg-amazon-orange text-white':'bg-white text-gray-700 shadow'}`}>{t.orders}</button>
                                    <button onClick={()=>setAdminTab('products')} className={`px-6 py-2 rounded-full font-bold transition-colors whitespace-nowrap ${adminTab==='products'?'bg-amazon-orange text-white':'bg-white text-gray-700 shadow'}`}>{t.products}</button>
                                    <button onClick={()=>setAdminTab('sales')} className={`px-6 py-2 rounded-full font-bold transition-colors whitespace-nowrap ${adminTab==='sales'?'bg-amazon-orange text-white':'bg-white text-gray-700 shadow'}`}>{t.sales}</button>
                                </div>

                                {adminTab === 'orders' && (
                                    <div className="bg-white rounded-xl shadow-lg p-4 sm:p-6">
                                        <h3 className="text-xl font-bold mb-4">{t.orders}</h3>
                                        <div className="space-y-4">
                                            {orders.map(order => (
                                                <div key={order.id} className={`border rounded-lg p-4 ${order.status === 'pending' ? 'border-yellow-400 bg-yellow-50' : order.status === 'accepted' ? 'border-green-400 bg-green-50' : 'border-red-400 bg-red-50'}`}>
                                                    <div className="flex flex-wrap justify-between items-start gap-4 mb-3 border-b pb-3">
                                                        <div>
                                                            <span className="bg-gray-800 text-white px-2 py-1 rounded text-sm font-bold ml-2">{order.invoiceId}</span>
                                                            <h4 className="font-bold text-lg inline-block">{order.customer.name}</h4>
                                                            <p className="text-sm text-gray-600">{new Date(order.date).toLocaleString('ar-IQ')}</p>
                                                            <p className="text-sm mt-1"><strong>العنوان:</strong> {order.customer.address}</p>
                                                            {order.customer.notes && <p className="text-sm text-red-600"><strong>ملاحظة:</strong> {order.customer.notes}</p>}
                                                        </div>
                                                        <div className="text-left">
                                                            <p className="text-xl font-black text-amazon-orange">{order.total.toLocaleString()} {t.currency}</p>
                                                            <span className={`inline-block mt-1 px-3 py-1 rounded-full text-sm font-bold ${order.status==='pending'?'bg-yellow-200 text-yellow-800':order.status==='accepted'?'bg-green-200 text-green-800':'bg-red-200 text-red-800'}`}>
                                                                {t[order.status]}
                                                            </span>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="mb-4 bg-white p-3 rounded border">
                                                        {order.items.map((item, i) => (
                                                            <div key={i} className="flex justify-between text-sm py-1 border-b last:border-0">
                                                                <span>{item.qty}x {item.name} <span className="text-xs text-gray-400">({item.sku})</span></span>
                                                                <span className="font-bold">{(item.price * item.qty).toLocaleString()} {t.currency}</span>
                                                            </div>
                                                        ))}
                                                    </div>

                                                    <div className="flex gap-2 justify-end">
                                                        {order.status === 'pending' && (
                                                            <>
                                                                <button onClick={()=>updateOrderStatus(order.id, 'accepted')} className="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded font-bold shadow">{t.accept}</button>
                                                                <button onClick={()=>updateOrderStatus(order.id, 'rejected')} className="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded font-bold shadow">{t.reject}</button>
                                                            </>
                                                        )}
                                                        <button onClick={()=>handlePrint(order)} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold shadow flex items-center gap-1">
                                                            🖨️ {t.print}
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                            {orders.length === 0 && <p className="text-gray-500">لا توجد طلبيات.</p>}
                                        </div>
                                    </div>
                                )}

                                {adminTab === 'products' && (
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        <div className="lg:col-span-1 bg-white rounded-xl shadow-lg p-6">
                                            <h3 className="text-xl font-bold mb-4">{t.addProduct}</h3>
                                            <form onSubmit={handleAddProduct} className="space-y-4">
                                                <input required type="text" placeholder={t.pName} value={newProduct.name} onChange={e=>setNewProduct({...newProduct, name: e.target.value})} className="w-full border p-3 rounded-lg focus:ring-2 outline-none" />
                                                <input required type="number" placeholder={t.pPrice} value={newProduct.price} onChange={e=>setNewProduct({...newProduct, price: e.target.value})} className="w-full border p-3 rounded-lg focus:ring-2 outline-none" />
                                                <input required type="text" placeholder={t.pImg} value={newProduct.imageUrl} onChange={e=>setNewProduct({...newProduct, imageUrl: e.target.value})} className="w-full border p-3 rounded-lg focus:ring-2 outline-none" dir="ltr" />
                                                <select value={newProduct.category} onChange={e=>setNewProduct({...newProduct, category: e.target.value})} className="w-full border p-3 rounded-lg outline-none">
                                                    {CATEGORIES.filter(c=>c!=='الكل').map(c=><option key={c} value={c}>{c}</option>)}
                                                </select>
                                                <textarea placeholder={t.pDesc} value={newProduct.description} onChange={e=>setNewProduct({...newProduct, description: e.target.value})} className="w-full border p-3 rounded-lg focus:ring-2 outline-none" rows="3"></textarea>
                                                <button type="submit" className="w-full bg-amazon hover:bg-amazon-light text-white font-bold py-3 rounded-lg">{t.publish}</button>
                                            </form>
                                        </div>
                                        <div className="lg:col-span-2 bg-white rounded-xl shadow-lg p-6">
                                            <div className="flex justify-between mb-4">
                                                <h3 className="text-xl font-bold">إدارة المنتجات</h3>
                                                <input type="text" placeholder={t.adminSearch} value={adminSearch} onChange={e=>setAdminSearch(e.target.value)} className="border p-2 rounded w-64 outline-none" />
                                            </div>
                                            <div className="space-y-3 max-h-[600px] overflow-y-auto pr-2">
                                                {products.filter(p => p.name.includes(adminSearch) || (p.sku && p.sku.includes(adminSearch.toUpperCase()))).map(p => (
                                                    <div key={p.id} className="flex items-center gap-4 border p-3 rounded-lg hover:bg-gray-50">
                                                        <img src={p.imageUrl} className="w-16 h-16 object-contain rounded bg-white border" />
                                                        <div className="flex-1">
                                                            <span className="text-xs font-bold text-blue-600">{p.sku}</span>
                                                            <h4 className="font-bold line-clamp-1">{p.name}</h4>
                                                            <p className="text-amazon-orange font-bold">{Number(p.price).toLocaleString()} {t.currency}</p>
                                                        </div>
                                                        <button onClick={()=>deleteProduct(p.id)} className="text-red-500 hover:bg-red-100 p-2 rounded font-bold">{t.delete}</button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {adminTab === 'sales' && (
                                    <div className="bg-white rounded-xl shadow-lg p-6">
                                        <h3 className="text-2xl font-black mb-6">{t.sales} / {t.totalSales}</h3>
                                        <div className="bg-blue-50 border border-blue-200 p-6 rounded-xl text-center">
                                            <p className="text-gray-600 font-bold text-lg mb-2">مجموع المبيعات (الطلبيات المقبولة)</p>
                                            <p className="text-4xl font-black text-blue-700">
                                                {orders.filter(o => o.status === 'accepted').reduce((acc, o) => acc + o.total, 0).toLocaleString()} {t.currency}
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : null}
                    </main>

                    {/* Footer */}
                    <footer className="bg-amazon-light text-white text-center py-6 mt-auto no-print">
                        <p className="text-sm font-bold text-gray-400">
                            © <span onClick={handleSecretLogin} className="cursor-default select-none">2026</span> KE STORE. All rights reserved.
                        </p>
                    </footer>

                    {/* Product Details Modal */}
                    {selectedProduct && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 animate-fade-in no-print" onClick={()=>setSelectedProduct(null)}>
                            <div className="bg-white rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto flex flex-col md:flex-row relative" onClick={e=>e.stopPropagation()}>
                                <button onClick={()=>setSelectedProduct(null)} className="absolute top-4 right-4 bg-gray-100 hover:bg-gray-200 text-gray-800 p-2 rounded-full z-10 font-bold">X</button>
                                <div className="md:w-1/2 p-8 bg-gray-50 flex items-center justify-center">
                                    <img src={selectedProduct.imageUrl} className="w-full h-auto max-h-[400px] object-contain hover:scale-105 transition-transform" />
                                </div>
                                <div className="md:w-1/2 p-8 flex flex-col">
                                    <span className="text-sm text-amazon-orange font-bold mb-2">{selectedProduct.category} | {selectedProduct.sku}</span>
                                    <h2 className="text-2xl font-black mb-4">{selectedProduct.name}</h2>
                                    {renderStars()}
                                    <p className="text-3xl font-black text-gray-900 my-4">{Number(selectedProduct.price).toLocaleString()} {t.currency}</p>
                                    <div className="prose prose-sm mb-6 text-gray-600 border-t pt-4">
                                        <p>{selectedProduct.description || 'لا يوجد وصف متاح.'}</p>
                                    </div>
                                    <button onClick={()=>{addToCart(selectedProduct); setSelectedProduct(null);}} className="mt-auto w-full bg-amazon-yellow hover:bg-amazon-orange text-black font-black py-4 rounded-xl shadow-lg transition-transform hover:-translate-y-1 text-lg">
                                        {t.addCart}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Cart Drawer */}
                    {isCartOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex justify-end animate-fade-in no-print" onClick={()=>setIsCartOpen(false)}>
                            <div className="bg-white w-full max-w-md h-full flex flex-col shadow-2xl animate-slide-up" onClick={e=>e.stopPropagation()}>
                                <div className="p-4 bg-amazon-light text-white flex justify-between items-center shadow-md">
                                    <h2 className="text-xl font-black flex items-center gap-2">🛒 {t.cart}</h2>
                                    <button onClick={()=>setIsCartOpen(false)} className="text-white hover:text-red-400 font-bold text-xl">X</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                    {cart.length === 0 ? (
                                        <div className="text-center py-20 text-gray-400 font-bold">
                                            <p className="text-6xl mb-4">🛍️</p>
                                            <p>{t.emptyCart}</p>
                                        </div>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.id} className="flex gap-4 border-b pb-4 items-center bg-gray-50 p-2 rounded-lg">
                                                <img src={item.imageUrl} className="w-20 h-20 object-contain bg-white rounded border" />
                                                <div className="flex-1">
                                                    <h4 className="font-bold text-sm line-clamp-2">{item.name}</h4>
                                                    <p className="text-amazon-orange font-black mt-1">{Number(item.price).toLocaleString()} {t.currency}</p>
                                                    <div className="flex items-center gap-3 mt-2 bg-white w-fit border rounded-full px-2">
                                                        <button onClick={()=>updateQty(item.id, -1)} className="text-xl font-bold px-2 text-gray-600 hover:text-red-500">-</button>
                                                        <span className="font-black text-lg w-4 text-center">{item.qty}</span>
                                                        <button onClick={()=>updateQty(item.id, 1)} className="text-xl font-bold px-2 text-gray-600 hover:text-green-500">+</button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                                {cart.length > 0 && (
                                    <div className="p-6 bg-gray-50 border-t shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                                        <div className="flex justify-between text-xl font-black mb-4">
                                            <span>{t.total}:</span>
                                            <span className="text-amazon-orange">{cartTotal.toLocaleString()} {t.currency}</span>
                                        </div>
                                        <button onClick={()=>{setIsCartOpen(false); setIsCheckoutOpen(true);}} className="w-full bg-amazon-yellow hover:bg-amazon-orange text-black font-black py-4 rounded-xl shadow-lg transition-transform hover:scale-[1.02]">
                                            {t.checkout}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Checkout Modal */}
                    {isCheckoutOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4 animate-fade-in no-print" onClick={()=>setIsCheckoutOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-lg p-6 sm:p-8 shadow-2xl relative" onClick={e=>e.stopPropagation()}>
                                <button onClick={()=>setIsCheckoutOpen(false)} className="absolute top-4 right-4 text-gray-500 hover:text-red-500 font-bold">X</button>
                                <h2 className="text-2xl font-black mb-6 text-amazon-light border-b pb-2">{t.checkoutTitle}</h2>
                                <form onSubmit={handleOrderSubmit} className="space-y-5">
                                    <div>
                                        <label className="block font-bold mb-1 text-gray-700">{t.cName}</label>
                                        <input required type="text" value={orderForm.name} onChange={e=>setOrderForm({...orderForm, name: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-amazon-orange outline-none bg-gray-50 focus:bg-white transition-colors" />
                                    </div>
                                    <div>
                                        <label className="block font-bold mb-1 text-gray-700">{t.cAddress}</label>
                                        <input required type="text" value={orderForm.address} onChange={e=>setOrderForm({...orderForm, address: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-amazon-orange outline-none bg-gray-50 focus:bg-white transition-colors" placeholder="المدينة، الحي، أقرب نقطة دالة..." />
                                    </div>
                                    <div>
                                        <label className="block font-bold mb-1 text-gray-700">{t.cNotes}</label>
                                        <textarea value={orderForm.notes} onChange={e=>setOrderForm({...orderForm, notes: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-amazon-orange outline-none bg-gray-50 focus:bg-white transition-colors" rows="2"></textarea>
                                    </div>
                                    <div className="bg-orange-50 border border-orange-200 p-4 rounded-lg flex justify-between items-center">
                                        <span className="font-bold text-orange-800">المطلوب دفعه عند الاستلام:</span>
                                        <span className="text-xl font-black text-amazon-orange">{cartTotal.toLocaleString()} {t.currency}</span>
                                    </div>
                                    <button type="submit" className="w-full bg-amazon hover:bg-amazon-light text-white font-black py-4 rounded-xl shadow-lg transition-transform hover:-translate-y-1 text-lg">
                                        {t.confirmOrder}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Success Modal */}
                    {isSuccessOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[120] flex items-center justify-center p-4 animate-fade-in no-print">
                            <div className="bg-white rounded-3xl w-full max-w-sm p-8 text-center shadow-2xl animate-pop border-4 border-green-400">
                                <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <span className="text-6xl">✓</span>
                                </div>
                                <h2 className="text-3xl font-black mb-2 text-green-600">{t.successMsg}</h2>
                                <p className="text-gray-600 mb-8 font-bold">{t.successSub}</p>
                                <button onClick={()=>{setIsSuccessOpen(false); setPage('home');}} className="w-full bg-amazon hover:bg-amazon-light text-white font-black py-4 rounded-xl shadow-lg transition-transform hover:scale-105">
                                    {t.backToHome}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
