<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KE STORE - التسوق الشامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        amazon: {
                            DEFAULT: '#131921',
                            light: '#232f3e',
                            yellow: '#febd69',
                            orange: '#f90'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        pop: { '0%': { transform: 'scale(0.95)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; padding: 2px 6px; font-size: 11px; font-weight: 900; border: 2px solid white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e5e7eb; }
        .product-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); border-color: #febd69; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-4 { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden selection:bg-amazon-orange selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Firebase Config (Only Database needed now) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDirc0CpBTWr5gxtZQv4ASZv8VRPP2QT90",
            databaseURL: "https://kurdtoolserver-default-rtdb.firebaseio.com/",
            projectId: "kurdtoolserver",
            storageBucket: "kurdtoolserver.appspot.com",
            appId: "1:215346001086:android:aa60f04312d614d29ddaef"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        const CATEGORIES = ['الكل', 'إلكترونيات', 'طيور وزينة', 'لوازم سيارات', 'منزل ومطبخ', 'أخرى'];

        // --- Translations ---
        const TR = {
            ar: {
                home: "الرئيسية", logout: "خروج",
                search: "ابحث عن السلع، الماركات، والمزيد...", cart: "عربة التسوق", emptyCart: "عربة التسوق الخاصة بك فارغة",
                addCart: "أضف إلى العربة", total: "المجموع", checkout: "متابعة عملية الشراء",
                currency: "د.ع", welcome: "مرحباً بك في", sub: "ملايين المنتجات. توصيل سريع. أسعار تنافسية.",
                lang: "کوردی", adminTitle: "إدارة المنتجات", addProduct: "إضافة منتج جديد",
                pName: "اسم المنتج", pPrice: "السعر", pImg: "رابط الصورة", pDesc: "الوصف", pCat: "القسم", publish: "نشر",
                checkoutTitle: "معلومات التوصيل", cName: "الاسم الكامل", cAddress: "العنوان بالتفصيل",
                cNotes: "ملاحظات للمندوب", confirmOrder: "تأكيد الطلب الآن", successMsg: "تم استلام طلبك بنجاح! 🎉",
                successSub: "سيقوم فريقنا بالتواصل معك قريباً.", backToHome: "الاستمرار في التسوق",
                addedToCart: "تمت الإضافة للعربة!", freeDelivery: "توصيل مجاني", productDetails: "تفاصيل المنتج",
                buyNow: "اشترِ الآن", account: "الحساب", outOfStock: "نفذت الكمية"
            },
            ku: {
                home: "سەرەکی", logout: "دەرچوون",
                search: "گەڕان بۆ کاڵا، براند، و زیاتر...", cart: "سەبەتە", emptyCart: "سەبەتەکەت بەتاڵە",
                addCart: "بۆ ناو سەبەتە", total: "کۆی گشتی", checkout: "کڕین",
                currency: "د.ع", welcome: "بەخێربێیت بۆ", sub: "ملیۆنان کاڵا. گەیاندنی خێرا. باشترین نرخ.",
                lang: "العربية", adminTitle: "بەڕێوەبردنی کاڵاکان", addProduct: "زیادکردنی کاڵای نوێ",
                pName: "ناوی کاڵا", pPrice: "نرخ", pImg: "لینکی وێنە", pDesc: "وەسف", pCat: "بەش", publish: "بڵاوکردنەوە",
                checkoutTitle: "زانیاری گەیاندن", cName: "ناوی تەواو", cAddress: "ناونیشانی تەواو",
                cNotes: "تێبینی بۆ گەیاندنکار", confirmOrder: "تأکیدکردنەوەی داواکاری", successMsg: "داواکارییەکەت وەرگیرا! 🎉",
                successSub: "بەم زووانە پەیوەندیت پێوە دەکەین.", backToHome: "گەڕانەوە بۆ فرۆشگا",
                addedToCart: "خرایە سەبەتەکەوە!", freeDelivery: "گەیاندنی خۆڕایی", productDetails: "وردەکاری کاڵا",
                buyNow: "ئێستا بیکڕە", account: "هەژمار", outOfStock: "نەماوە"
            }
        };

        const App = () => {
            const [lang, setLang] = useState('ar');
            const [page, setPage] = useState('home');
            const [isAdmin, setIsAdmin] = useState(false); // Secret Admin State
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [search, setSearch] = useState('');
            const [activeCat, setActiveCat] = useState('الكل');
            const [selectedProduct, setSelectedProduct] = useState(null); 
            
            const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
            const [isSuccessOpen, setIsSuccessOpen] = useState(false);
            const [toastMsg, setToastMsg] = useState('');
            const [orderForm, setOrderForm] = useState({ name: '', address: '', notes: '' });

            const t = TR[lang];

            useEffect(() => {
                const ref = db.ref('products');
                ref.on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const list = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                        setProducts(list.reverse());
                    } else {
                        setProducts([]);
                    }
                });
                return () => ref.off();
            }, []);

            // --- Hidden Admin Login Logic ---
            const handleSecretLogin = () => {
                if (isAdmin) {
                    setPage('admin');
                    return;
                }
                const email = window.prompt("Email:");
                if (email === "tafteshok@gmail.com") {
                    const password = window.prompt("Password:");
                    if (password === "224080") {
                        setIsAdmin(true);
                        setPage('admin');
                        showToast("بەخێربێیت بۆ پەناڵی ئەدمین");
                    } else {
                        alert("Password incorrect!");
                    }
                }
            };

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            const addToCart = (product) => {
                const exist = cart.find(x => x.id === product.id);
                if (exist) {
                    setCart(cart.map(x => x.id === product.id ? { ...exist, qty: exist.qty + 1 } : x));
                } else {
                    setCart([...cart, { ...product, qty: 1 }]);
                }
                showToast(t.addedToCart);
                setSelectedProduct(null); 
            };

            const updateQty = (id, amount) => {
                const exist = cart.find(x => x.id === id);
                if (exist.qty === 1 && amount === -1) setCart(cart.filter(x => x.id !== id));
                else setCart(cart.map(x => x.id === id ? { ...exist, qty: exist.qty + amount } : x));
            };

            const cartTotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

            const handleOrderSubmit = (e) => {
                e.preventDefault();
                db.ref('orders').push({
                    customer: orderForm,
                    items: cart,
                    total: cartTotal,
                    date: new Date().toISOString()
                });
                
                setIsCheckoutOpen(false);
                setIsSuccessOpen(true);
                setCart([]);
                setOrderForm({ name: '', address: '', notes: '' });
            };

            const filteredProducts = products.filter(p => {
                const matchCat = activeCat === 'الكل' || p.category === activeCat;
                const matchSearch = p.name.toLowerCase().includes(search.toLowerCase()) || (p.description && p.description.toLowerCase().includes(search.toLowerCase()));
                return matchCat && matchSearch;
            });

            const renderStars = () => {
                return (
                    <div className="flex items-center text-amazon-orange text-sm mb-1">
                        ★ ★ ★ ★ <span className="text-gray-300">★</span> 
                        <span className="text-blue-600 text-xs ml-1 font-normal">(128)</span>
                    </div>
                );
            }

            return (
                <div className={`flex flex-col min-h-screen ${lang === 'ku' ? 'text-right' : 'text-right'}`} dir="rtl">
                    {/* Toast */}
                    {toastMsg && (
                        <div className="fixed top-24 left-1/2 transform -translate-x-1/2 z-[150] bg-green-600 text-white px-6 py-3 rounded-full shadow-2xl font-bold animate-slide-up flex items-center gap-2">
                            ✓ {toastMsg}
                        </div>
                    )}

                    {/* Top Navbar */}
                    <header className="bg-amazon text-white sticky top-0 z-50">
                        <div className="max-w-[1500px] mx-auto px-4 py-3 flex items-center justify-between gap-4">
                            <div onClick={() => setPage('home')} className="flex items-center gap-2 cursor-pointer border border-transparent hover:border-white p-1 rounded">
                                <span className="text-2xl font-black tracking-tighter text-amazon-orange">KE<span className="text-white font-bold">STORE</span></span>
                            </div>

                            <div className="flex-1 hidden md:flex h-11 rounded-md overflow-hidden bg-white group focus-within:ring-4 ring-amazon-orange/50 transition-shadow">
                                <select className="bg-gray-100 text-gray-700 px-3 text-sm border-none outline-none border-r border-gray-300 cursor-pointer hover:bg-gray-200 font-bold">
                                    {CATEGORIES.map(c=><option key={c}>{c === 'الكل' ? (lang==='ku'?'هەمووی':'الكل') : c}</option>)}
                                </select>
                                <input type="text" placeholder={t.search} value={search} onChange={(e)=>setSearch(e.target.value)} className="flex-1 px-4 text-black outline-none" />
                                <button className="bg-amazon-yellow hover:bg-amazon-orange text-black px-6 transition-colors flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                                </button>
                            </div>

                            <div className="flex items-center gap-2 sm:gap-4">
                                <button onClick={() => setLang(lang === 'ar' ? 'ku' : 'ar')} className="flex items-center gap-1 font-bold text-sm hover:text-gray-300 border border-transparent hover:border-white p-2 rounded">
                                    🌐 {t.lang}
                                </button>

                                {/* Admin Button (Only visible if already logged in secretly) */}
                                {isAdmin && (
                                    <div className="flex items-center gap-2">
                                        <span onClick={() => setPage(page === 'admin' ? 'home' : 'admin')} className="text-amazon-orange hover:text-white cursor-pointer ml-1 text-xl" title="إدارة المنتجات">⚙️</span>
                                        <button onClick={() => { setIsAdmin(false); setPage('home'); }} className="text-xs text-red-400 hover:text-red-300 font-bold p-1 border border-transparent hover:border-white rounded">{t.logout}</button>
                                    </div>
                                )}

                                <div className="relative flex items-center cursor-pointer border border-transparent hover:border-white p-1 rounded" onClick={() => setIsCartOpen(true)}>
                                    <div className="relative">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                                        <span className="absolute top-1 left-1/2 transform -translate-x-1/2 text-amazon-orange font-bold text-sm bg-amazon w-6 h-5 text-center flex justify-center items-center rounded-full mt-1">
                                            {cart.reduce((a,c)=>a+c.qty,0)}
                                        </span>
                                    </div>
                                    <span className="font-bold hidden sm:block mt-auto text-sm">{t.cart}</span>
                                </div>
                            </div>
                        </div>

                        <div className="md:hidden px-4 pb-3">
                            <div className="flex h-11 rounded-md overflow-hidden bg-white shadow-inner focus-within:ring-2 ring-amazon-orange">
                                <input type="text" placeholder={t.search} value={search} onChange={(e)=>setSearch(e.target.value)} className="flex-1 px-4 text-black outline-none" />
                                <button className="bg-amazon-yellow text-black px-5"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
                            </div>
                        </div>

                        <div className="bg-amazon-light text-white text-sm px-4 py-2 overflow-x-auto hide-scroll flex gap-4 whitespace-nowrap shadow-md">
                            <button className="font-bold flex items-center gap-1">☰ الأقسام</button>
                            {CATEGORIES.map(cat => (
                                <button key={cat} onClick={() => {setActiveCat(cat); setPage('home');}} className={`hover:border-white border border-transparent px-2 py-0.5 rounded transition-colors ${activeCat === cat ? 'font-black text-amazon-yellow bg-white/10' : ''}`}>
                                    {cat === 'الكل' ? (lang === 'ku' ? 'هەمووی' : 'الكل') : cat}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="flex-1 w-full max-w-[1500px] mx-auto animate-fade-in pb-12">
                        {page === 'home' ? (
                            <div className="relative">
                                <div className="w-full h-[250px] sm:h-[350px] bg-gradient-to-r from-amazon-light to-blue-900 relative">
                                    <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=2070')] bg-cover bg-center mix-blend-overlay opacity-50"></div>
                                    <div className="absolute inset-0 bg-gradient-to-t from-gray-100 to-transparent"></div>
                                    <div className="relative z-10 px-6 pt-10 sm:pt-20 text-white max-w-xl mx-auto text-center drop-shadow-2xl">
                                        <h1 className="text-4xl sm:text-6xl font-black mb-3">{t.welcome} <span className="text-amazon-yellow">KESTORE</span></h1>
                                        <p className="text-lg sm:text-xl font-bold bg-black/30 inline-block px-4 py-1 rounded-full">{t.sub}</p>
                                    </div>
                                </div>

                                <div className="px-4 -mt-20 sm:-mt-28 relative z-20">
                                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6">
                                        {filteredProducts.length === 0 ? (
                                            <div className="col-span-full text-center py-20 bg-white rounded-xl shadow-lg">
                                                <h3 className="font-bold text-2xl text-gray-400">لا توجد منتجات / کاڵا نەدۆزرایەوە</h3>
                                            </div>
                                        ) : (
                                            filteredProducts.map(p => (
                                                <div key={p.id} onClick={() => setSelectedProduct(p)} className="product-card bg-white cursor-pointer rounded-xl overflow-hidden flex flex-col group relative">
                                                    <div className="w-full pt-[100%] relative bg-gray-50 flex items-center justify-center overflow-hidden">
                                                        <img src={p.imageUrl} className="absolute inset-0 w-full h-full object-contain p-6 mix-blend-multiply group-hover:scale-105 transition-transform duration-500" onError={(e)=>e.target.src='https://via.placeholder.com/400'} />
                                                    </div>
                                                    <div className="p-4 flex-1 flex flex-col bg-white">
                                                        <h3 className="font-bold text-base text-gray-900 mb-2 line-clamp-2 group-hover:text-amazon-orange transition-colors">{p.name}</h3>
                                                        {renderStars()}
                                                        <div className="mt-2 mb-3">
                                                            <span className="text-2xl font-black text-gray-900">{Number(p.price).toLocaleString()}</span>
                                                            <span className="text-sm font-bold text-gray-500 mr-1">{t.currency}</span>
                                                        </div>
                                                        <div className="text-xs text-green-600 font-bold mb-4 flex items-center gap-1 bg-green-50 w-fit px-2 py-1 rounded">
                                                            ✓ {t.freeDelivery}
                                                        </div>
                                                        <button onClick={(e) => { e.stopPropagation(); addToCart(p); }} className="mt-auto w-full bg-amazon-yellow hover:bg-amazon-orange text-black py-2.5 rounded-full text-sm font-black shadow-md hover:shadow-lg transition-all active:scale-95">
                                                            {t.addCart}
                                                        </button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <AdminPanel db={db} products={products} t={t} CATEGORIES={CATEGORIES} />
                        )}
                    </main>

                    <footer className="bg-amazon-light text-white text-center py-10 mt-auto border-t-4 border-amazon-orange">
                        <div className="max-w-7xl mx-auto px-4">
                            <h2 className="text-2xl font-black mb-4">KE <span className="text-amazon-yellow">STORE</span></h2>
                            {/* Hidden Admin Trigger here */}
                            <p className="text-gray-400 text-sm font-semibold">© <span onClick={handleSecretLogin} className="cursor-pointer hover:text-white transition-colors">2026</span> جميع الحقوق محفوظة | هەموو مافێک پارێزراوە</p>
                        </div>
                    </footer>

                    {/* Enhanced Product Details Modal */}
                    {selectedProduct && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 sm:p-6">
                            <div className="absolute inset-0 bg-black/70 backdrop-blur-md transition-opacity" onClick={() => setSelectedProduct(null)}></div>
                            <div className="relative w-full max-w-5xl bg-white rounded-2xl shadow-2xl flex flex-col md:flex-row overflow-hidden animate-pop max-h-[90vh]">
                                <button onClick={() => setSelectedProduct(null)} className="absolute top-4 left-4 z-20 w-10 h-10 bg-white/80 hover:bg-red-500 hover:text-white rounded-full flex items-center justify-center font-black shadow-lg transition-colors border border-gray-200">✕</button>
                                
                                <div className="w-full md:w-1/2 bg-gray-50 flex items-center justify-center p-8 md:p-12 border-l border-gray-100 relative">
                                    <img src={selectedProduct.imageUrl} className="max-h-[350px] md:max-h-[500px] w-full object-contain mix-blend-multiply drop-shadow-xl" />
                                </div>
                                
                                <div className="w-full md:w-1/2 p-6 md:p-10 flex flex-col overflow-y-auto">
                                    <span className="text-sm font-black text-white bg-amazon-orange w-fit px-3 py-1 rounded-full mb-4 shadow-sm">{selectedProduct.category}</span>
                                    <h2 className="text-2xl md:text-4xl font-black text-gray-900 mb-3 leading-tight">{selectedProduct.name}</h2>
                                    {renderStars()}
                                    
                                    <div className="my-6">
                                        <span className="text-4xl font-black text-gray-900">{Number(selectedProduct.price).toLocaleString()}</span>
                                        <span className="text-lg font-bold text-gray-500 mr-2">{t.currency}</span>
                                    </div>

                                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 mb-6">
                                        <h4 className="font-black text-gray-800 mb-2">{t.productDetails}:</h4>
                                        <p className="text-gray-600 text-base leading-relaxed font-semibold whitespace-pre-wrap">{selectedProduct.description}</p>
                                    </div>
                                    
                                    <div className="mt-auto space-y-4 pt-4">
                                        <div className="bg-green-50 p-4 rounded-xl flex items-center gap-3 text-sm font-black text-green-700 border border-green-100">
                                            <span className="text-2xl">🚚</span> {t.freeDelivery} لجميع المحافظات / گەیاندن بۆ هەموو شارەکان
                                        </div>
                                        <button onClick={() => addToCart(selectedProduct)} className="w-full bg-amazon-yellow hover:bg-amazon-orange text-black py-4 rounded-full font-black shadow-xl hover:shadow-2xl transition-all transform active:scale-95 text-xl flex justify-center items-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                                            {t.addCart}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Cart Drawer */}
                    {isCartOpen && !isCheckoutOpen && (
                        <div className="fixed inset-0 z-[130] flex justify-end">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-gray-50 h-full shadow-2xl flex flex-col animate-slide-up sm:animate-fade-in border-l border-gray-200">
                                <div className="bg-white p-5 border-b border-gray-200 flex justify-between items-center shadow-sm">
                                    <h2 className="text-2xl font-black text-gray-900 flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                                        {t.cart} ({cart.reduce((a,c)=>a+c.qty,0)})
                                    </h2>
                                    <button onClick={() => setIsCartOpen(false)} className="w-8 h-8 flex justify-center items-center rounded-full bg-gray-100 hover:bg-red-500 hover:text-white font-bold transition-colors text-lg">✕</button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                    {cart.length === 0 ? (
                                        <div className="text-center py-32 text-gray-400 flex flex-col items-center">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className="mb-4"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                                            <h3 className="text-2xl font-black">{t.emptyCart}</h3>
                                        </div>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.id} className="flex gap-4 bg-white p-4 rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                                <div className="w-24 h-24 bg-gray-50 rounded-lg flex-shrink-0 border border-gray-100 p-2">
                                                    <img src={item.imageUrl} className="w-full h-full object-contain mix-blend-multiply" />
                                                </div>
                                                <div className="flex-1 flex flex-col">
                                                    <h4 className="font-bold text-sm text-gray-800 line-clamp-2">{item.name}</h4>
                                                    <div className="text-amazon-orange font-black text-lg my-1">{Number(item.price).toLocaleString()} {t.currency}</div>
                                                    <div className="flex items-center justify-between mt-auto">
                                                        <div className="flex items-center gap-4 bg-gray-100 rounded-full px-3 py-1 border border-gray-200">
                                                            <button onClick={()=>updateQty(item.id, -1)} className="text-gray-600 font-black hover:text-red-500 text-lg">-</button>
                                                            <span className="font-black text-sm">{item.qty}</span>
                                                            <button onClick={()=>updateQty(item.id, 1)} className="text-gray-600 font-black hover:text-blue-600 text-lg">+</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>

                                <div className="bg-white p-6 border-t border-gray-200 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
                                    <div className="flex justify-between items-center mb-6">
                                        <span className="font-black text-gray-500 text-lg">{t.total}:</span>
                                        <span className="text-3xl font-black text-gray-900">{cartTotal.toLocaleString()} {t.currency}</span>
                                    </div>
                                    <button 
                                        onClick={() => { if(cart.length>0) setIsCheckoutOpen(true); }} 
                                        className={`w-full py-4 rounded-full font-black shadow-lg transition-all text-lg ${cart.length > 0 ? 'bg-amazon-yellow hover:bg-amazon-orange text-black hover:shadow-xl transform active:scale-95' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                        {t.checkout}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Checkout Modal */}
                    {isCheckoutOpen && (
                        <div className="fixed inset-0 z-[140] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setIsCheckoutOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-white rounded-2xl shadow-2xl flex flex-col animate-pop overflow-hidden">
                                <div className="bg-gray-50 p-5 border-b border-gray-100 flex justify-between items-center">
                                    <h2 className="text-xl font-black text-gray-800">{t.checkoutTitle}</h2>
                                    <button onClick={() => setIsCheckoutOpen(false)} className="text-gray-400 hover:text-red-500 font-bold bg-white w-8 h-8 rounded-full shadow-sm border flex justify-center items-center">✕</button>
                                </div>
                                <form onSubmit={handleOrderSubmit} className="p-6 space-y-5">
                                    <div>
                                        <label className="text-sm font-black text-gray-700 mb-2 block">{t.cName}</label>
                                        <input required type="text" className="w-full bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-amazon-orange focus:bg-white outline-none px-4 py-3 font-semibold transition-all" value={orderForm.name} onChange={e=>setOrderForm({...orderForm, name:e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-sm font-black text-gray-700 mb-2 block">{t.cAddress}</label>
                                        <input required type="text" className="w-full bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-amazon-orange focus:bg-white outline-none px-4 py-3 font-semibold transition-all" value={orderForm.address} onChange={e=>setOrderForm({...orderForm, address:e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-sm font-black text-gray-700 mb-2 block">{t.cNotes} (ئارەزوومەندانە)</label>
                                        <textarea rows="3" className="w-full bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-amazon-orange focus:bg-white outline-none px-4 py-3 font-semibold transition-all resize-none" value={orderForm.notes} onChange={e=>setOrderForm({...orderForm, notes:e.target.value})}></textarea>
                                    </div>
                                    <button type="submit" className="w-full bg-amazon-yellow hover:bg-amazon-orange text-black py-4 rounded-full font-black shadow-lg hover:shadow-xl transform active:scale-95 transition-all mt-6 text-lg">
                                        {t.confirmOrder} ({cartTotal.toLocaleString()} {t.currency})
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Success Modal */}
                    {isSuccessOpen && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
                            <div className="relative w-full max-w-sm bg-white rounded-2xl shadow-2xl p-8 text-center animate-pop">
                                <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <span className="text-5xl">✅</span>
                                </div>
                                <h2 className="text-2xl font-black text-gray-800 mb-3">{t.successMsg}</h2>
                                <p className="text-gray-500 font-bold mb-8 text-base">{t.successSub}</p>
                                <button onClick={() => { setIsSuccessOpen(false); setIsCartOpen(false); }} className="w-full bg-amazon hover:bg-amazon-light text-white py-4 rounded-full font-black shadow-lg hover:shadow-xl transform active:scale-95 transition-all">
                                    {t.backToHome}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const AdminPanel = ({ db, products, t, CATEGORIES }) => {
            const [form, setForm] = useState({ name: '', price: '', imageUrl: '', description: '', category: 'إلكترونيات' });

            const handleAdd = (e) => {
                e.preventDefault();
                db.ref('products').push({ ...form, price: Number(form.price), createdAt: Date.now() });
                setForm({ name: '', price: '', imageUrl: '', description: '', category: 'إلكترونيات' });
                alert("تم النشر بنجاح / بە سەرکەوتوویی بڵاوکرایەوە");
            };

            return (
                <div className="p-4 sm:p-8 mt-6">
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-1 bg-white p-6 sm:p-8 rounded-2xl shadow-lg border border-gray-100 self-start">
                            <h2 className="text-2xl font-black mb-6 text-gray-800 border-b pb-4">{t.addProduct}</h2>
                            <form onSubmit={handleAdd} className="space-y-5">
                                <div><label className="text-sm font-black text-gray-700 block mb-2">{t.pName}</label><input required className="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-amazon-orange font-semibold" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-sm font-black text-gray-700 block mb-2">{t.pPrice}</label><input required type="number" className="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-amazon-orange font-semibold" value={form.price} onChange={e=>setForm({...form, price:e.target.value})} /></div>
                                    <div><label className="text-sm font-black text-gray-700 block mb-2">{t.pCat}</label><select className="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-amazon-orange font-semibold" value={form.category} onChange={e=>setForm({...form, category:e.target.value})}>{CATEGORIES.filter(c=>c!=='الكل').map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                                </div>
                                <div><label className="text-sm font-black text-gray-700 block mb-2">{t.pImg}</label><input required type="url" dir="ltr" placeholder="https://" className="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-amazon-orange font-semibold" value={form.imageUrl} onChange={e=>setForm({...form, imageUrl:e.target.value})} /></div>
                                <div><label className="text-sm font-black text-gray-700 block mb-2">{t.pDesc}</label><textarea required rows="4" className="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-amazon-orange font-semibold resize-none" value={form.description} onChange={e=>setForm({...form, description:e.target.value})}></textarea></div>
                                <button type="submit" className="w-full bg-amazon hover:bg-amazon-light text-white py-3.5 rounded-full font-black shadow-lg hover:shadow-xl transition-all text-lg mt-2">{t.publish}</button>
                            </form>
                        </div>
                        <div className="lg:col-span-2 bg-white p-6 sm:p-8 rounded-2xl shadow-lg border border-gray-100">
                            <h2 className="text-2xl font-black mb-6 text-gray-800 border-b pb-4">{t.adminTitle} <span className="bg-amazon-orange text-white text-sm px-3 py-1 rounded-full">{products.length}</span></h2>
                            <div className="space-y-4">
                                {products.map(p => (
                                    <div key={p.id} className="flex items-center gap-4 border border-gray-100 p-4 rounded-xl hover:bg-gray-50 transition-colors shadow-sm">
                                        <img src={p.imageUrl} className="w-16 h-16 rounded-lg object-contain bg-white border border-gray-100 p-1" />
                                        <div className="flex-1">
                                            <h4 className="font-bold text-base text-gray-800 line-clamp-1">{p.name}</h4>
                                            <span className="text-amazon-orange font-black text-base">{Number(p.price).toLocaleString()} {t.currency}</span>
                                        </div>
                                        <button onClick={() => { if(window.confirm('دڵنیای لە سڕینەوەی ئەم کاڵایە؟')) db.ref(`products/${p.id}`).remove(); }} className="text-red-600 font-bold text-sm bg-red-50 px-4 py-2 rounded-lg hover:bg-red-100 border border-red-100 transition-colors">سڕینەوە</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
