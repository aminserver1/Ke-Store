        /* Zoom effect */

        .zoom-img { transition: transform 0.4s ease; width: 100%; height: 100%; object-fit: contain; }

            });
            
            useEffect(() => {
                document.documentElement.dir = lang === 'en' ? 'ltr' : 'rtl';
                document.documentElement.lang = lang;
            }, [lang]);

            const changeLanguage = () => {
                const nextLang = lang === 'ar' ? 'ku' : (lang === 'ku' ? 'en' : 'ar');
                setLang(nextLang);
                localStorage.setItem('lang', nextLang);

            const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);

            const [toastMsg, setToastMsg] = useState('');
            const [orderForm, setOrderForm] = useState({ name: '', phone: '', address: '', notes: '' });
            const [inputCode, setInputCode] = useState('');
            const [appliedDiscount, setAppliedDiscount] = useState(null); // {code, percentage}

            const [adminTab, setAdminTab] = useState('orders');

            const [sliderProductSearch, setSliderProductSearch] = useState('');
            const [selectedSliderProduct, setSelectedSliderProduct] = useState(null);

            let clickTimer = useRef(null);

            useEffect(() => {
                const pRef = db.ref('products');
                pRef.on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const prods = Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse();
                        setProducts(prods);
                        const params = new URLSearchParams(window.location.search);
                        const pid = params.get('productId');
                        if (pid && !selectedProduct) {
                            const found = prods.find(p => p.id === pid);
                            if (found) {
                                setSelectedProduct(found);
                                setActiveImage(found.imageUrl);
                            }
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    }
                    else setProducts([]);
                });

                const oRef = db.ref('orders');
                oRef.on('value', snap => {
                    const data = snap.val();
                    if (data) setOrders(Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse());
                    else setOrders([]);
                });

                const nRef = db.ref('KESTOREnotification');
                nRef.on('value', snap => {
                    const data = snap.val();
                    if (data) setNotifications(Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse());
                    else setNotifications([]);
                });

                const sRef = db.ref('sliders');
                sRef.on('value', snap => {
                    const data = snap.val();
                    if (data) setSliders(Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse());
                    else setSliders([]);
                });

                const dRef = db.ref('discounts');
                dRef.on('value', snap => {
                    const data = snap.val();
                    if (data) setDiscounts(Object.keys(data).map(key => ({ id: key, ...data[key] })));
                    else setDiscounts([]);
                });

                return () => { pRef.off(); oRef.off(); nRef.off(); sRef.off(); dRef.off(); };
            }, []);

            const isNew = (dateString) => {
                if (!dateString) return false;
                const created = new Date(dateString);
                const now = new Date();
                return ((now - created) / (1000 * 60 * 60 * 24)) <= 7;
            };

            const handleSecretLogin = () => {
                if (search.trim() === "tafteshok@gmail.com") {
                    clickCount.current += 1;
                    if (clickCount.current >= 6) {
                        clickCount.current = 0;
                        setSearch('');

                                setIsAdmin(true);
                                setPage('admin');
                                showToast("بەخێربێیت بۆ پەناڵی ئەدمین");
                            }
                        } else {
                            setPage('admin');
                        }
                    }
                    clearTimeout(clickTimer.current);
                    clickTimer.current = setTimeout(() => { clickCount.current = 0; }, 3000);
                } else {
                    setPage('home');
                }
            };

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            const handleShare = (productId) => {
                const url = `${window.location.origin}${window.location.pathname}?productId=${productId}`;
                if (navigator.share) navigator.share({ title: 'KESTORE', url: url }).catch(console.error);
                else { navigator.clipboard.writeText(url); showToast(t.copyLink); }
            };

            const addToCart = (product, qty = 1) => {
                const exist = cart.find(x => x.id === product.id);
                if (exist) setCart(cart.map(x => x.id === product.id ? { ...exist, qty: exist.qty + qty } : x));
                else setCart([...cart, { ...product, qty: qty }]);
                showToast(t.addedToCart);
                setAppliedDiscount(null); // Reset discount when cart changes
            };

            const updateQty = (id, amount) => {
                const exist = cart.find(x => x.id === id);
                if (exist.qty === 1 && amount === -1) setCart(cart.filter(x => x.id !== id));
                else setCart(cart.map(x => x.id === id ? { ...exist, qty: exist.qty + amount } : x));
                setAppliedDiscount(null);
            };

            const applyDiscountCode = () => {
                const codeObj = discounts.find(d => d.code.toLowerCase() === inputCode.toLowerCase());
                if (codeObj) {
                    setAppliedDiscount({ code: codeObj.code, percentage: Number(codeObj.percentage) });
                    showToast(`${t.discountApplied} ${codeObj.percentage}%`);
                } else {
                    showToast(t.invalidCode);
                    setAppliedDiscount(null);
                }
            };

            const cartTotalItemsPrice = cart.reduce((acc, item) => acc + ((Number(item.price)||0) * item.qty), 0);
            const cartDeliveryFee = cart.length > 0 ? Math.max(...cart.map(item => Number(item.deliveryFee) || 5000)) : 0;
            
            const discountAmountVal = appliedDiscount ? (cartTotalItemsPrice * (appliedDiscount.percentage / 100)) : 0;
            const cartGrandTotal = (cartTotalItemsPrice - discountAmountVal) + cartDeliveryFee;

            const handleOrderSubmit = (e) => {
                e.preventDefault();
                const invoiceId = 'INV-' + Math.floor(100000 + Math.random() * 900000);
                
                const orderData = {
                    invoiceId,
                    customer: orderForm,
                    items: cart,
                    cartTotal: cartTotalItemsPrice,
                    deliveryFee: cartDeliveryFee,
                    discountCode: appliedDiscount ? appliedDiscount.code : null,
                    discountPercentage: appliedDiscount ? appliedDiscount.percentage : 0,
                    discountAmount: discountAmountVal,
                    total: cartGrandTotal, 
                    date: new Date().toISOString(),
                    status: 'pending'
                };

                db.ref('orders').push(orderData);
                setLastOrderInvoice(invoiceId);
                setIsCheckoutOpen(false);
                setIsSuccessOpen(true);
                setCart([]);
                setOrderForm({ name: '', phone: '', address: '', notes: '' });
                setAppliedDiscount(null);
                setInputCode('');
            };

            const searchTerms = search.toLowerCase().trim().split(/\s+/);
            const filteredProducts = products.filter(p => {
                const matchCat = activeCat === 'الكل' || p.category === activeCat;
                const searchString = `${p.name || ''} ${p.description || ''} ${p.sku || p.id}`.toLowerCase();
                const matchSearch = searchTerms.every(term => searchString.includes(term));
                return matchCat && matchSearch;
            });

                e.preventDefault();
                const sku = 'ITM-' + Math.floor(1000 + Math.random() * 9000);
                db.ref('products').push({ 
                    ...newProduct, 
                    sku, 
                    price: Number(newProduct.price),
                    costPrice: Number(newProduct.costPrice || 0),
                    deliveryFee: Number(newProduct.deliveryFee || 5000),
                    date: new Date().toISOString()
                });
                setNewProduct({ name: '', price: '', costPrice: '', deliveryFee: 5000, imageUrl: '', imageUrl2: '', imageUrl3: '', imageUrl4: '', description: '', category: 'إلكترونيات' });
                showToast("تم إضافة المنتج بنجاح");
            };

            const handleAddNotif = (e) => {
                e.preventDefault();
                db.ref('KESTOREnotification').push({ ...newNotif, date: new Date().toISOString() });

                e.preventDefault();

                let orderProfit = 0;
                if(o.items) {
                    o.items.forEach(item => {
                        const sPrice = Number(item.price) || 0;
                        const cPrice = Number(item.costPrice) || 0; 
                        orderProfit += (sPrice - cPrice) * (item.qty || 1);

                                                    {selectedSliderProduct ? (
                                                        <div className="flex justify-between items-center bg-blue-100 p-2 rounded-lg border border-blue-200">
                                                            <span className="text-sm font-bold text-blue-800">{t.selectedItem} {selectedSliderProduct.name}</span>
                                                            <button type="button" onClick={() => setSelectedSliderProduct(null)} className="text-red-500 font-bold text-xs">إلغاء</button>
                                                        </div>
                                                    ) : (
                                                        <div className="relative">
                                                            <input type="text" placeholder={t.search} value={sliderProductSearch} onChange={e=>setSliderProductSearch(e.target.value)} className="w-full border p-2 rounded-lg outline-none focus:border-purple-500 bg-white" />
                                                            {sliderProductSearch && (
                                                                <div className="absolute z-50 w-full bg-white border mt-1 rounded-lg shadow-xl max-h-48 overflow-y-auto">
                                                                    {products.filter(p=>(p.name || '').toLowerCase().includes(sliderProductSearch.toLowerCase())).map(p=>(
                                                                        <div key={p.id} onClick={()=>{ setSelectedSliderProduct(p); setSliderProductSearch(''); }} className="p-2 hover:bg-gray-100 cursor-pointer text-xs flex items-center gap-2 border-b">
                                                                            <img src={p.imageUrl} className="w-8 h-8 object-contain" /><span>{p.name}</span>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                                <button type="submit" className="w-full bg-purple-600 text-white font-bold py-3 rounded-lg mt-4">{t.addOffer}</button>
                                            </form>
                                        </div>
                                        <div className="space-y-4">
                                            {sliders.map(s => (
                                                <div key={s.id} className="border bg-white p-3 rounded-xl flex items-center gap-4">
                                                    <img src={s.imageUrl} className="w-20 h-12 object-cover rounded" />
                                                    <div className="flex-1">
                                                        <div className="font-bold text-xs">{s.title || 'No Title'}</div>
                                                        {s.productId && <div className="text-[10px] text-blue-600 font-bold">Linked to Item</div>}
                                                    </div>
                                                    <button onClick={()=>deleteItem('sliders', s.id)} className="text-red-500"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {adminTab === 'notifications' && (
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                            <h3 className="text-xl font-bold mb-4">{t.sendNotif}</h3>
                                            <form onSubmit={handleAddNotif} className="space-y-4">
                                                <input required type="text" placeholder={t.notifTitle} value={newNotif.title} onChange={e=>setNewNotif({...newNotif, title: e.target.value})} className="w-full border p-3 rounded-lg outline-none" />
                                                <textarea required placeholder={t.notifMsg} value={newNotif.message} onChange={e=>setNewNotif({...newNotif, message: e.target.value})} className="w-full border p-3 rounded-lg outline-none" rows="3"></textarea>
                                                <input type="text" placeholder={t.notifImg} value={newNotif.imageUrl} onChange={e=>setNewNotif({...newNotif, imageUrl: e.target.value})} className="w-full border p-3 rounded-lg outline-none" dir="ltr" />
                                                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">{t.sendNotif}</button>
                                            </form>
                                        </div>
                                        <div className="space-y-4">
                                            {notifications.map(n => (
                                                <div key={n.id} className="bg-white p-4 rounded-xl shadow-sm border-r-4 border-r-blue-500 flex justify-between items-start">
                                                    <div>
                                                        <h4 className="font-bold text-sm mb-1">{n.title}</h4>
                                                        <p className="text-gray-600 text-xs">{n.message}</p>
                                                    </div>
                                                    <button onClick={()=>deleteItem('KESTOREnotification', n.id)} className="text-red-500"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {adminTab === 'discounts' && (
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                            <h3 className="text-xl font-bold mb-4">{t.discountCodeTitle}</h3>
                                            <form onSubmit={handleAddDiscount} className="space-y-4">
                                                <input required type="text" placeholder={t.discountCode} value={newDiscount.code} onChange={e=>setNewDiscount({...newDiscount, code: e.target.value})} className="w-full border p-3 rounded-lg outline-none uppercase font-bold text-center tracking-widest" dir="ltr" />
                                                <input required type="number" placeholder={t.discountPercent} min="1" max="100" value={newDiscount.percentage} onChange={e=>setNewDiscount({...newDiscount, percentage: e.target.value})} className="w-full border p-3 rounded-lg outline-none text-center font-bold text-red-600" dir="ltr" />
                                                <button type="submit" className="w-full bg-red-600 text-white font-bold py-3 rounded-lg">{t.addDiscount}</button>
                                            </form>
                                        </div>
                                        <div className="space-y-4">
                                            {discounts.map(d => (
                                                <div key={d.id} className="border border-red-200 bg-red-50 p-4 rounded-xl flex items-center justify-between">
                                                    <div>
                                                        <div className="font-black text-lg tracking-widest">{d.code}</div>
                                                        <div className="text-sm font-bold text-red-600">خصم {d.percentage}%</div>
                                                    </div>
                                                    <button onClick={()=>deleteItem('discounts', d.id)} className="text-red-500 bg-white p-2 rounded-full shadow-sm"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : null}
                    </main>

                    {/* Product Details Modal */}
                    {selectedProduct && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex justify-center items-center p-4 md:p-8 animate-fade-in" onClick={() => setSelectedProduct(null)}>
                            <div className="bg-white rounded-2xl w-full max-w-5xl max-h-[95vh] overflow-y-auto flex flex-col md:flex-row shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                <div className="absolute top-4 right-4 z-10 flex gap-2">
                                    <button onClick={() => handleShare(selectedProduct.id)} className="bg-blue-100 text-blue-800 rounded-full p-2 transition-colors"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg></button>
                                    <button onClick={() => setSelectedProduct(null)} className="bg-gray-200 text-gray-800 rounded-full p-2"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                </div>
                                
                                <div className="md:w-1/2 p-4 bg-gray-50 border-b md:border-b-0 md:border-l border-gray-200 flex flex-col items-center pt-14 md:pt-6">
                                    <div className="w-full h-[40vh] md:h-[60vh] bg-white rounded-xl border border-gray-200 flex items-center justify-center zoom-container mb-4" onClick={() => setIsFullscreenZoom(true)}>
                                        <img src={activeImage} className="zoom-img" alt="Product" />
                                    </div>
                                    <div className="flex gap-2 w-full overflow-x-auto hide-scroll justify-center">
                                        {[selectedProduct.imageUrl, selectedProduct.imageUrl2, selectedProduct.imageUrl3, selectedProduct.imageUrl4].filter(Boolean).map((img, idx) => (
                                            <img key={idx} src={img} onClick={() => setActiveImage(img)} className={`w-16 h-16 object-contain bg-white border-2 rounded-lg cursor-pointer transition-all ${activeImage === img ? 'border-amazon-orange scale-105' : 'border-gray-200 opacity-60 hover:opacity-100'}`} />
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="md:w-1/2 p-6 md:p-8 flex flex-col">
                                    <span className="text-xs text-gray-400 mb-2">{selectedProduct.category} • {selectedProduct.sku}</span>
                                    <h2 className="text-2xl md:text-3xl font-black mb-4 text-gray-900 leading-tight">{selectedProduct.name}</h2>
                                    <div className="text-3xl font-black text-amazon-orange my-4">{(Number(selectedProduct.price)||0).toLocaleString()} {t.currency}</div>
                                    <div className="bg-gray-50 p-4 rounded-xl mb-6 flex-1 overflow-y-auto border border-gray-100">
                                        <p className="whitespace-pre-wrap text-gray-700 leading-relaxed text-sm">{selectedProduct.description || 'No description available.'}</p>
                                    </div>
                                    <div className="flex gap-3 items-center mt-auto">
                                        <div className="flex items-center gap-3 bg-gray-100 rounded-xl p-2 border border-gray-200">
                                            <button onClick={() => setSelectedQty(Math.max(1, selectedQty - 1))} className="w-12 h-12 flex items-center justify-center bg-white rounded-lg shadow-sm text-xl font-bold">-</button>
                                            <span className="font-black text-xl w-8 text-center">{selectedQty}</span>
                                            <button onClick={() => setSelectedQty(selectedQty + 1)} className="w-12 h-12 flex items-center justify-center bg-white rounded-lg shadow-sm text-xl font-bold">+</button>
                                        </div>
                                        <button onClick={() => { addToCart(selectedProduct, selectedQty); setSelectedProduct(null); }} className="flex-1 h-16 bg-amazon-yellow hover:bg-amazon-orange text-black font-black rounded-xl text-lg transition-colors shadow-md">
                                            {t.addCart}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Cart Modal */}
                    {isCartOpen && (
                        <div className="fixed inset-0 bg-black/70 z-[110] flex justify-center items-center p-4" onClick={() => setIsCartOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-lg max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl">
                                    <h2 className="font-bold text-xl">{t.cart}</h2>
                                    <button onClick={() => setIsCartOpen(false)}><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                </div>
                                <div className="p-4 flex-1 overflow-y-auto">
                                    {cart.length === 0 ? <p className="text-center py-10 text-gray-400 font-bold">{t.emptyCart}</p> : 
                                        cart.map(c => (
                                            <div key={c.id} className="flex justify-between items-center mb-4 border p-3 rounded-xl bg-white shadow-sm">
                                                <img src={c.imageUrl} className="w-12 h-12 object-contain" />
                                                <div className="flex-1 px-3">
                                                    <h4 className="font-bold text-xs line-clamp-1">{c.name}</h4>
                                                    <p className="text-amazon-orange font-black text-xs">{(Number(c.price)||0).toLocaleString()} {t.currency}</p>
                                                </div>
                                                <div className="flex items-center gap-2 bg-gray-100 rounded-lg p-1">
                                                    <button onClick={() => updateQty(c.id, -1)} className="w-6 h-6 flex items-center justify-center bg-white rounded shadow-sm font-bold">-</button>
                                                    <span className="font-bold w-4 text-center text-xs">{c.qty}</span>
                                                    <button onClick={() => updateQty(c.id, 1)} className="w-6 h-6 flex items-center justify-center bg-white rounded shadow-sm font-bold">+</button>
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>
                                {cart.length > 0 && (
                                    <div className="p-4 border-t bg-gray-50 rounded-b-2xl">
                                        <div className="flex justify-between items-center mb-4 font-bold">
                                            <span>{t.total}:</span>
                                            <span className="text-xl text-amazon-orange">{cartTotalItemsPrice.toLocaleString()} {t.currency}</span>
                                        </div>
                                        <button onClick={() => { setIsCartOpen(false); setIsCheckoutOpen(true); }} className="w-full bg-amazon-yellow text-black py-3 font-bold rounded-xl text-lg">
                                            {t.checkout}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Checkout Modal */}
                    {isCheckoutOpen && (
                        <div className="fixed inset-0 bg-black/70 z-[110] flex justify-center items-center p-4" onClick={() => setIsCheckoutOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="p-4 border-b flex justify-between items-center bg-amazon text-white rounded-t-2xl sticky top-0 z-10">
                                    <h2 className="text-xl font-bold">{t.checkoutTitle}</h2>
                                    <button onClick={() => setIsCheckoutOpen(false)}><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                </div>
                                <div className="p-6">
                                    <form onSubmit={handleOrderSubmit} className="space-y-4">
                                        <input required placeholder={t.cName} value={orderForm.name} onChange={e => setOrderForm({...orderForm, name: e.target.value})} className="w-full border p-3 rounded-lg outline-none bg-gray-50 focus:bg-white" />
                                        <input required type="tel" placeholder={t.cPhone} value={orderForm.phone} onChange={e => setOrderForm({...orderForm, phone: e.target.value})} className="w-full border p-3 rounded-lg outline-none bg-gray-50 focus:bg-white" dir="ltr" />
                                        <input required placeholder={t.cAddress} value={orderForm.address} onChange={e => setOrderForm({...orderForm, address: e.target.value})} className="w-full border p-3 rounded-lg outline-none bg-gray-50 focus:bg-white" />
                                        <textarea placeholder={t.cNotes} value={orderForm.notes} onChange={e => setOrderForm({...orderForm, notes: e.target.value})} className="w-full border p-3 rounded-lg outline-none bg-gray-50 focus:bg-white" rows="2"></textarea>
                                        
                                        {/* Discount System UI */}
                                        <div className="border border-red-200 bg-red-50 p-4 rounded-xl">
                                            <label className="block text-sm font-bold text-red-800 mb-2">{t.haveDiscount}</label>
                                            <div className="flex gap-2">
                                                <input type="text" placeholder={t.discountCode} value={inputCode} onChange={e => setInputCode(e.target.value)} className="flex-1 border p-2 rounded-lg outline-none uppercase font-bold text-center" dir="ltr" disabled={!!appliedDiscount} />
                                                {!appliedDiscount ? (
                                                    <button type="button" onClick={applyDiscountCode} className="bg-red-600 text-white px-4 font-bold rounded-lg text-sm">{t.applyDiscount}</button>
                                                ) : (
                                                    <button type="button" onClick={() => {setAppliedDiscount(null); setInputCode('');}} className="bg-gray-400 text-white px-4 font-bold rounded-lg text-sm">إلغاء</button>
                                                )}
                                            </div>
                                            {appliedDiscount && <p className="text-green-600 text-xs font-bold mt-2 text-center">{t.discountApplied} {appliedDiscount.percentage}%</p>}
                                        </div>

                                        <div className="bg-gray-100 p-4 rounded-xl text-sm">
                                            <div className="flex justify-between mb-2"><span>{t.total}:</span><span className="font-bold">{cartTotalItemsPrice.toLocaleString()} {t.currency}</span></div>
                                            <div className="flex justify-between mb-2"><span>{t.deliveryFeeInput}:</span><span className="font-bold">{cartDeliveryFee.toLocaleString()} {t.currency}</span></div>
                                            {appliedDiscount && (
                                                <div className="flex justify-between mb-2 text-red-600 font-bold"><span>{t.discountAmount}:</span><span>- {discountAmountVal.toLocaleString()} {t.currency}</span></div>
                                            )}
                                            <div className="flex justify-between border-t border-gray-300 pt-3 text-amazon-orange font-black text-xl"><span>Total:</span><span>{cartGrandTotal.toLocaleString()} {t.currency}</span></div>
                                        </div>
                                        <button type="submit" className="w-full bg-amazon-orange text-white py-4 rounded-xl font-black text-lg shadow-lg">
                                            {t.confirmOrder}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Success Modal */}
                    {isSuccessOpen && (
                        <div className="fixed inset-0 bg-black/80 z-[120] flex justify-center items-center p-4" onClick={() => setIsSuccessOpen(false)}>
                            <div className="bg-white rounded-2xl p-8 text-center max-w-sm w-full animate-pop">
                                <div className="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6"><svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg></div>
                                <h2 className="text-2xl font-black mb-3">{t.successMsg}</h2>
                                <p className="text-gray-600 mb-6 font-bold">{t.successSub}</p>
                                <div className="bg-gray-100 p-3 rounded-lg mb-6 border-2 border-dashed">
                                    <p className="text-xs text-gray-500">{t.invoiceNo}</p>
                                    <h3 className="text-xl font-black text-amazon-orange" dir="ltr">{lastOrderInvoice}</h3>
                                </div>
                                <button onClick={() => setIsSuccessOpen(false)} className="w-full bg-amazon text-white py-3 rounded-xl font-bold">{t.backToHome}</button>
                            </div>
                        </div>
                    )}

                    {/* Contact Modal */}
                    {isContactOpen && (
                        <div className="fixed inset-0 bg-black/70 z-[120] flex justify-center items-center p-4 no-print" onClick={()=>setIsContactOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-sm text-center p-6 animate-pop" onClick={e=>e.stopPropagation()}>
                                <h2 className="text-xl font-black mb-4">{t.contactUs}</h2>
                                <a href="https://wa.me/9647800041290" target="_blank" className="w-full bg-green-500 text-white font-black py-4 rounded-xl flex items-center justify-center gap-2">WhatsApp</a>
                                <button onClick={()=>setIsContactOpen(false)} className="mt-4 text-gray-400 font-bold underline">{t.backToHome}</button>
                            </div>
                        </div>
                    )}

                    {/* Notifications Modal */}
                    {isNotifOpen && (
                        <div className="fixed inset-0 bg-black/70 z-[110] flex justify-center items-start pt-20 px-4 no-print" onClick={()=>setIsNotifOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-md max-h-[70vh] overflow-hidden flex flex-col" onClick={e=>e.stopPropagation()}>
                                <div className="bg-amazon text-white p-4 flex justify-between items-center font-bold">
                                    <span>{t.notifications}</span>
                                    <button onClick={()=>setIsNotifOpen(false)}><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                </div>
                                <div className="overflow-y-auto p-4 space-y-3 bg-gray-50 flex-1">
                                    {notifications.length === 0 ? <p className="text-center text-gray-500 py-10">{t.noNotif}</p> : 
                                        notifications.map(n => (
                                            <div key={n.id} className="bg-white p-4 rounded-xl shadow-sm border-r-4 border-r-blue-500">
                                                <h4 className="font-bold text-sm mb-1">{n.title}</h4>
                                                <p className="text-gray-700 text-xs mb-2">{n.message}</p>
                                                {n.imageUrl && <img src={n.imageUrl} className="w-full h-32 object-cover rounded-lg" />}
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
