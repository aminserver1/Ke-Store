<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KE STORE - التسوق الشامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; font-weight: bold; border: 2px solid white; }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyDirc0CpBTWr5gxtZQv4ASZv8VRPP2QT90",
            databaseURL: "https://kurdtoolserver-default-rtdb.firebaseio.com/",
            projectId: "kurdtoolserver",
            storageBucket: "kurdtoolserver.appspot.com",
            appId: "1:215346001086:android:aa60f04312d614d29ddaef"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.database();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        const SUPER_ADMIN = "kooora.taqana@gmail.com";
        const CATEGORIES = ['الكل', 'إلكترونيات', 'طيور وزينة', 'لوازم سيارات', 'منزل ومطبخ', 'أخرى'];

        // --- Translations ---
        const TR = {
            ar: {
                home: "الرئيسية", admin: "لوحة التحكم", login: "تسجيل الدخول", logout: "تسجيل الخروج",
                search: "ابحث عن المنتجات...", cart: "سلة المشتريات", emptyCart: "سلتك فارغة حالياً",
                addCart: "أضف للسلة", total: "المجموع الكلي", checkout: "إرسال الطلب",
                currency: "د.ع", welcome: "اكتشف أفضل المنتجات", sub: "تشكيلة واسعة من الإلكترونيات، اللوازم، وغيرها الكثير بأسعار لا تقبل المنافسة.",
                lang: "کوردی", adminTitle: "إدارة المتجر", addProduct: "إضافة منتج جديد",
                pName: "اسم المنتج", pPrice: "السعر", pImg: "رابط الصورة", pDesc: "الوصف", pCat: "القسم", publish: "نشر المنتج"
            },
            ku: {
                home: "سەرەکی", admin: "کۆنتڕۆڵ پانێڵ", login: "چوونەژوورەوە", logout: "دەرچوون",
                search: "گەڕان بۆ کاڵاکان...", cart: "سەلەی کڕین", emptyCart: "سەلەکەت بەتاڵە",
                addCart: "بۆ ناو سەلە", total: "کۆی گشتی", checkout: "ناردنی داواکاری",
                currency: "د.ع", welcome: "باشترین کاڵاکان ببينە", sub: "باشترین جۆرەکانی ئەلیکترۆنیات، پێداویستی و زۆر شتی تر بە گونجاوترین نرخ.",
                lang: "العربية", adminTitle: "بەڕێوەبردنی فرۆشگا", addProduct: "زیادکردنی کاڵای نوێ",
                pName: "ناوی کاڵا", pPrice: "نرخ", pImg: "لینکی وێنە", pDesc: "وەسف", pCat: "بەش", publish: "بڵاوکردنەوە"
            }
        };

        const App = () => {
            const [lang, setLang] = useState('ar');
            const [page, setPage] = useState('home');
            const [user, setUser] = useState(null);
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [search, setSearch] = useState('');
            const [activeCat, setActiveCat] = useState('الكل');

            const t = TR[lang];
            const isAdmin = user && user.email === SUPER_ADMIN;

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => setUser(u));
                const ref = db.ref('products');
                ref.on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const list = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                        setProducts(list.reverse());
                    } else {
                        setProducts([]);
                    }
                });
                return () => { unsub(); ref.off(); };
            }, []);

            // Cart Functions
            const addToCart = (product) => {
                const exist = cart.find(x => x.id === product.id);
                if (exist) {
                    setCart(cart.map(x => x.id === product.id ? { ...exist, qty: exist.qty + 1 } : x));
                } else {
                    setCart([...cart, { ...product, qty: 1 }]);
                }
            };
            const updateQty = (id, amount) => {
                const exist = cart.find(x => x.id === id);
                if (exist.qty === 1 && amount === -1) {
                    setCart(cart.filter(x => x.id !== id));
                } else {
                    setCart(cart.map(x => x.id === id ? { ...exist, qty: exist.qty + amount } : x));
                }
            };
            const cartTotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

            // Filter Products
            const filteredProducts = products.filter(p => {
                const matchCat = activeCat === 'الكل' || p.category === activeCat;
                const matchSearch = p.name.toLowerCase().includes(search.toLowerCase()) || p.description.toLowerCase().includes(search.toLowerCase());
                return matchCat && matchSearch;
            });

            return (
                <div className={`flex flex-col min-h-screen ${lang === 'ku' ? 'text-right' : 'text-right'}`} dir="rtl">
                    {/* Navbar */}
                    <nav className="glass-panel sticky top-0 z-50 border-b border-gray-200 shadow-sm px-4 py-3">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div onClick={() => setPage('home')} className="flex items-center gap-3 cursor-pointer group">
                                    <div className="w-12 h-12 bg-gradient-to-br from-indigo-600 to-purple-700 text-white rounded-2xl flex items-center justify-center font-black text-xl shadow-lg group-hover:scale-105 transition-transform">KE</div>
                                    <span className="text-2xl font-black tracking-tight hidden sm:block text-slate-800">STORE</span>
                                </div>
                                <button onClick={() => setLang(lang === 'ar' ? 'ku' : 'ar')} className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-1.5 rounded-full text-sm font-bold transition">
                                    {t.lang}
                                </button>
                            </div>

                            <div className="flex items-center gap-3 sm:gap-6">
                                <div className="relative cursor-pointer" onClick={() => setIsCartOpen(true)}>
                                    <div className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center hover:bg-slate-200 transition">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                                    </div>
                                    {cart.length > 0 && <span className="badge">{cart.reduce((a,c)=>a+c.qty,0)}</span>}
                                </div>
                                
                                {user ? (
                                    <div className="flex items-center gap-3 border-r pr-3">
                                        {isAdmin && (
                                            <button onClick={() => setPage(page === 'admin' ? 'home' : 'admin')} className={`px-4 py-2 rounded-xl text-sm font-bold transition-colors ${page === 'admin' ? 'bg-indigo-600 text-white' : 'bg-rose-100 text-rose-700 hover:bg-rose-200'}`}>
                                                {t.admin}
                                            </button>
                                        )}
                                        <button onClick={() => auth.signOut()} className="text-sm font-bold text-slate-500 hover:text-red-500 transition">{t.logout}</button>
                                    </div>
                                ) : (
                                    <button onClick={() => auth.signInWithPopup(googleProvider)} className="bg-slate-900 hover:bg-slate-800 text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-md transition-all">
                                        {t.login}
                                    </button>
                                )}
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-1 w-full max-w-7xl mx-auto px-4 py-8">
                        {page === 'home' ? (
                            <div>
                                {/* Hero Section */}
                                <div className="bg-slate-900 rounded-[2.5rem] p-8 sm:p-16 mb-10 relative overflow-hidden text-center text-white shadow-2xl">
                                    <div className="absolute inset-0 opacity-20 bg-[url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=2070')] bg-cover bg-center"></div>
                                    <div className="relative z-10 max-w-2xl mx-auto">
                                        <h1 className="text-4xl sm:text-6xl font-black mb-4 leading-tight">{t.welcome}</h1>
                                        <p className="text-lg sm:text-xl text-slate-300 font-semibold mb-8">{t.sub}</p>
                                        <div className="relative max-w-md mx-auto">
                                            <input type="text" placeholder={t.search} value={search} onChange={(e)=>setSearch(e.target.value)} className="w-full pl-4 pr-12 py-4 rounded-2xl text-slate-900 font-bold outline-none focus:ring-4 ring-indigo-500/30" />
                                            <svg className="absolute right-4 top-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                                        </div>
                                    </div>
                                </div>

                                {/* Categories */}
                                <div className="flex gap-3 overflow-x-auto hide-scroll pb-4 mb-8">
                                    {CATEGORIES.map(cat => (
                                        <button key={cat} onClick={() => setActiveCat(cat)} className={`whitespace-nowrap px-6 py-2.5 rounded-2xl font-bold text-sm transition-all ${activeCat === cat ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200' : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'}`}>
                                            {cat === 'الكل' ? (lang === 'ku' ? 'هەمووی' : 'الكل') : cat}
                                        </button>
                                    ))}
                                </div>

                                {/* Products Grid */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                    {filteredProducts.length === 0 ? (
                                        <div className="col-span-full text-center py-20 text-slate-400 font-bold text-xl">لا توجد منتجات / کاڵا نەدۆزرایەوە</div>
                                    ) : (
                                        filteredProducts.map(p => (
                                            <div key={p.id} className="bg-white rounded-[2rem] border border-slate-100 p-3 hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 flex flex-col">
                                                <div className="w-full aspect-square rounded-[1.5rem] bg-slate-50 overflow-hidden relative mb-4">
                                                    <img src={p.imageUrl} className="w-full h-full object-cover hover:scale-110 transition-transform duration-500" onError={(e)=>e.target.src='https://via.placeholder.com/400'} />
                                                    <span className="absolute top-3 right-3 bg-white/90 backdrop-blur text-xs font-black px-3 py-1 rounded-full text-slate-700 shadow-sm">{p.category}</span>
                                                </div>
                                                <div className="px-2 flex-1 flex flex-col">
                                                    <h3 className="font-extrabold text-lg text-slate-800 mb-1 line-clamp-1">{p.name}</h3>
                                                    <p className="text-sm text-slate-500 mb-4 line-clamp-2 leading-relaxed flex-1">{p.description}</p>
                                                    <div className="flex items-center justify-between mt-auto pt-2">
                                                        <span className="text-xl font-black text-indigo-600">{Number(p.price).toLocaleString()} <span className="text-sm">{t.currency}</span></span>
                                                        <button onClick={() => addToCart(p)} className="w-10 h-10 rounded-xl bg-slate-900 text-white flex items-center justify-center hover:bg-indigo-600 transition-colors shadow-md active:scale-95">
                                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        ) : (
                            <AdminPanel db={db} products={products} t={t} CATEGORIES={CATEGORIES} setPage={setPage} />
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-white border-t border-slate-200 py-8 mt-12">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <p className="text-slate-500 font-bold text-sm">© 2026 KE STORE. All Rights Reserved.</p>
                        </div>
                    </footer>

                    {/* Cart Drawer Modal */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-[100] flex justify-end">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col animate-slide-in">
                                <div className="flex items-center justify-between p-6 border-b">
                                    <h2 className="text-2xl font-black text-slate-800 flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                                        {t.cart}
                                    </h2>
                                    <button onClick={() => setIsCartOpen(false)} className="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 transition">✕</button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-6 space-y-4">
                                    {cart.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className="mb-4 opacity-50"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                                            <p className="font-bold text-lg">{t.emptyCart}</p>
                                        </div>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.id} className="flex gap-4 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                <img src={item.imageUrl} className="w-20 h-20 rounded-xl object-cover" />
                                                <div className="flex-1 flex flex-col justify-between">
                                                    <h4 className="font-bold text-sm text-slate-800 line-clamp-2">{item.name}</h4>
                                                    <div className="flex items-center justify-between mt-2">
                                                        <span className="font-black text-indigo-600">{Number(item.price).toLocaleString()} <span className="text-xs">{t.currency}</span></span>
                                                        <div className="flex items-center gap-3 bg-white border rounded-lg px-2 py-1 shadow-sm">
                                                            <button onClick={()=>updateQty(item.id, -1)} className="text-slate-500 font-bold px-1 hover:text-red-500">-</button>
                                                            <span className="font-bold text-sm w-4 text-center">{item.qty}</span>
                                                            <button onClick={()=>updateQty(item.id, 1)} className="text-slate-500 font-bold px-1 hover:text-indigo-600">+</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>

                                <div className="p-6 border-t bg-slate-50">
                                    <div className="flex justify-between items-center mb-6">
                                        <span className="font-bold text-slate-500 text-lg">{t.total}:</span>
                                        <span className="text-3xl font-black text-slate-900">{cartTotal.toLocaleString()} <span className="text-lg text-slate-500">{t.currency}</span></span>
                                    </div>
                                    <button onClick={() => { if(cart.length>0){ alert('تم إرسال الطلب بنجاح! / داواکارییەکەت نێردرا!'); setCart([]); setIsCartOpen(false); } }} className={`w-full py-4 rounded-2xl font-black text-lg transition-all shadow-xl ${cart.length > 0 ? 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-indigo-200' : 'bg-slate-300 text-slate-500 cursor-not-allowed'}`}>
                                        {t.checkout}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- Admin Panel Component ---
        const AdminPanel = ({ db, products, t, CATEGORIES, setPage }) => {
            const [form, setForm] = useState({ name: '', price: '', imageUrl: '', description: '', category: 'إلكترونيات' });

            const handleAdd = (e) => {
                e.preventDefault();
                db.ref('products').push({ ...form, price: Number(form.price), createdAt: Date.now() });
                setForm({ name: '', price: '', imageUrl: '', description: '', category: 'إلكترونيات' });
                alert("تم النشر بنجاح / بە سەرکەوتوویی بڵاوکرایەوە");
            };

            const handleDelete = (id) => {
                if(window.confirm('هل أنت متأكد من الحذف؟ / دڵنیای لە سڕینەوە؟')){
                    db.ref(`products/${id}`).remove();
                }
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    {/* Add Product Form */}
                    <div className="lg:col-span-5">
                        <div className="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100 sticky top-24">
                            <h2 className="text-2xl font-black mb-6 text-slate-800 flex items-center gap-3">
                                <span className="w-10 h-10 bg-indigo-100 text-indigo-600 flex items-center justify-center rounded-xl">✚</span>
                                {t.addProduct}
                            </h2>
                            <form onSubmit={handleAdd} className="space-y-5">
                                <div><label className="text-xs font-bold text-slate-500 mb-1 block">{t.pName}</label><input required className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-bold outline-none focus:border-indigo-500 focus:bg-white transition" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-xs font-bold text-slate-500 mb-1 block">{t.pPrice}</label><input required type="number" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-bold outline-none focus:border-indigo-500 focus:bg-white transition" value={form.price} onChange={e=>setForm({...form, price:e.target.value})} /></div>
                                    <div><label className="text-xs font-bold text-slate-500 mb-1 block">{t.pCat}</label><select className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-bold outline-none focus:border-indigo-500 focus:bg-white transition" value={form.category} onChange={e=>setForm({...form, category:e.target.value})}>{CATEGORIES.filter(c=>c!=='الكل').map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                                </div>
                                <div><label className="text-xs font-bold text-slate-500 mb-1 block">{t.pImg}</label><input required type="url" dir="ltr" placeholder="https://" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-bold outline-none focus:border-indigo-500 focus:bg-white transition" value={form.imageUrl} onChange={e=>setForm({...form, imageUrl:e.target.value})} /></div>
                                <div><label className="text-xs font-bold text-slate-500 mb-1 block">{t.pDesc}</label><textarea required rows="4" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-bold outline-none focus:border-indigo-500 focus:bg-white transition resize-none" value={form.description} onChange={e=>setForm({...form, description:e.target.value})}></textarea></div>
                                <button type="submit" className="w-full bg-slate-900 hover:bg-indigo-600 text-white py-4 rounded-xl font-black text-lg shadow-lg transition-all">{t.publish}</button>
                            </form>
                        </div>
                    </div>

                    {/* Manage Products List */}
                    <div className="lg:col-span-7">
                        <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100">
                            <div className="flex items-center justify-between mb-8">
                                <h2 className="text-2xl font-black text-slate-800">{t.adminTitle}</h2>
                                <span className="bg-slate-100 text-slate-600 px-4 py-1.5 rounded-full text-sm font-bold">العدد: {products.length}</span>
                            </div>
                            <div className="space-y-4">
                                {products.length === 0 ? <p className="text-center py-10 text-slate-400 font-bold">لا توجد منتجات</p> : 
                                    products.map(p => (
                                        <div key={p.id} className="flex flex-col sm:flex-row items-center gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100 hover:shadow-md transition">
                                            <img src={p.imageUrl} className="w-20 h-20 rounded-xl object-cover bg-white" onError={(e)=>e.target.src='https://via.placeholder.com/100'} />
                                            <div className="flex-1 text-center sm:text-right">
                                                <h4 className="font-bold text-lg text-slate-800 mb-1">{p.name}</h4>
                                                <div className="flex flex-wrap items-center justify-center sm:justify-start gap-3">
                                                    <span className="text-indigo-600 font-black">{Number(p.price).toLocaleString()} {t.currency}</span>
                                                    <span className="text-xs bg-white border px-2 py-1 rounded-md font-bold text-slate-500">{p.category}</span>
                                                </div>
                                            </div>
                                            <button onClick={() => handleDelete(p.id)} className="w-full sm:w-auto mt-4 sm:mt-0 bg-red-50 text-red-500 hover:bg-red-500 hover:text-white px-4 py-2 rounded-xl font-bold transition-colors">حذف</button>
                                        </div>
                                    ))
                                }
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
