                                    </div>

                                </div>
                            </div>

                        <div className="md:hidden px-4 pb-3">
                            <div className="flex h-11 rounded-md overflow-hidden bg-white shadow-inner focus-within:ring-2 ring-amazon-orange">
                                <input type="text" placeholder={t.search} value={search} onChange={(e)=>setSearch(e.target.value)} className="flex-1 px-4 text-black outline-none" />

                            </div>

                                <button key={cat} onClick={() => {setActiveCat(cat); setPage('home');}} className={`hover:border-white border border-transparent px-2 py-0.5 rounded transition-colors ${activeCat === cat ? 'font-black text-amazon-yellow bg-white/10' : ''}`}>
                                    {cat === 'الكل' ? (lang === 'ku' ? 'هەمووی' : 'الكل') : cat}
                                </button>

                                <div className="w-full h-[300px] sm:h-[400px] bg-gradient-to-r from-amazon-light to-blue-900 relative mb-12">

                                    <div className="absolute inset-0 bg-gradient-to-t from-gray-100 to-transparent"></div>
                                    <div className="relative z-10 px-6 pt-16 sm:pt-32 text-white max-w-xl mx-auto text-center drop-shadow-2xl">
                                        <h1 className="text-4xl sm:text-6xl font-black mb-4">{t.welcome} <span className="text-amazon-yellow">KESTORE</span></h1>
                                        <p className="text-lg sm:text-xl font-bold bg-black/40 inline-block px-5 py-2 rounded-full backdrop-blur-sm border border-white/20">{t.sub}</p>
                                    </div>
                                </div>

                                <div className="px-4 -mt-20 sm:-mt-28 relative z-20">
                                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6">

                                            <div className="col-span-full text-center py-20 bg-white rounded-xl shadow-lg">
                                                <h3 className="font-bold text-2xl text-gray-400">لا توجد منتجات / کاڵا نەدۆزرایەوە</h3>
                                            </div>

                                                    <div className="w-full h-[200px] sm:h-[240px] relative bg-white flex items-center justify-center overflow-hidden border-b border-gray-100">
                                                        <img src={p.imageUrl} className="absolute inset-0 w-full h-full object-contain p-2 group-hover:scale-105 transition-transform duration-500" onError={(e)=>e.target.src='https://via.placeholder.com/400'} />
                                                    </div>
                                                    <div className="p-4 flex-1 flex flex-col bg-white">
                                                        <span className="text-xs text-gray-400 mb-1">{p.sku}</span>
                                                        <h3 className="font-bold text-base text-gray-900 mb-2 line-clamp-2 group-hover:text-amazon-orange transition-colors">{p.name}</h3>
                                                        {renderStars()}
                                                        <div className="mt-2 mb-3">
                                                            <span className="text-2xl font-black text-gray-900">{Number(p.price).toLocaleString()} {t.currency}</span>
                                                        </div>
                                                        <button onClick={(e) => { e.stopPropagation(); addToCart(p); }} className="mt-auto w-full bg-amazon-yellow hover:bg-amazon-orange text-black font-bold py-2 rounded-lg transition-colors shadow-md hover:shadow-lg">
                                                            {t.addCart}
                                                        </button>
                                                    </div>
                                                </div>
                                            ))

                                    </div>
                                </div>
                            </div>

                                    <button onClick={()=>setAdminTab('orders')} className={`px-6 py-2 rounded-full font-bold transition-colors whitespace-nowrap ${adminTab==='orders'?'bg-amazon-orange text-white':'bg-white text-gray-700 shadow'}`}>{t.orders}</button>

                                                (o.customer.phone && o.customer.phone.includes(orderSearchText)) ||
                                                (o.customer.name && o.customer.name.toLowerCase().includes(orderSearchText.toLowerCase()))

                                                            <span className="bg-gray-800 text-white px-2 py-1 rounded text-sm font-bold ml-2 shadow">{order.invoiceId}</span>

                                                            <p className="text-sm text-gray-600 mt-1">🕒 {new Date(order.date).toLocaleString('ar-IQ')}</p>
                                                            <p className="text-sm mt-1"><strong>مۆبایل / الهاتف:</strong> <span dir="ltr">{order.customer.phone || '---'}</span></p>
                                                            <p className="text-sm mt-1"><strong>العنوان:</strong> {order.customer.address}</p>
                                                            {order.customer.notes && <p className="text-sm font-bold text-red-600 mt-1"><strong>ملاحظة:</strong> {order.customer.notes}</p>}
                                                        </div>
                                                        <div className="text-left flex flex-col items-end gap-2">
                                                            <p className="text-2xl font-black text-amazon-orange">{order.total.toLocaleString()} {t.currency}</p>

                                                                {t[order.status]}
                                                            </span>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="mb-4 bg-white p-3 rounded-lg border shadow-sm">

                                                                <span><span className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded mr-1 font-bold">{item.qty}x</span> {item.name} <span className="text-xs text-gray-400">({item.sku})</span></span>
                                                                <span className="font-bold">{(item.price * item.qty).toLocaleString()} {t.currency}</span>
                                                            </div>
                                                        ))}

                                                            <span>أجور التوصيل / گەیاندن:</span>
                                                            <span className="font-bold">{(order.deliveryFee || 0).toLocaleString()} {t.currency}</span>
                                                        </div>
                                                    </div>

                                                    <div className="flex flex-wrap gap-2 justify-between items-center">
                                                        <div className="flex gap-2">
                                                            {order.status === 'pending' && (
                                                                <>
                                                                    <button onClick={()=>updateOrderStatus(order.id, 'accepted')} className="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded font-bold shadow">{t.accept}</button>
                                                                    <button onClick={()=>updateOrderStatus(order.id, 'rejected')} className="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded font-bold shadow">{t.reject}</button>
                                                                </>
                                                            )}
                                                            <button onClick={()=>handlePrint(order, 'invoice')} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold shadow flex items-center gap-1">
                                                                🖨️ {t.printInvoice}
                                                            </button>
                                                            <button onClick={()=>handlePrint(order, 'address')} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded font-bold shadow flex items-center gap-1">
                                                                📍 {t.printAddress}
                                                            </button>
                                                        </div>
                                                        <button onClick={()=>deleteOrder(order.id)} className="bg-red-100 hover:bg-red-200 text-red-600 px-4 py-2 rounded font-bold shadow flex items-center gap-1">
                                                            🗑️ {t.delete}
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                            {orders.length === 0 && <p className="text-gray-500">لا توجد طلبيات.</p>}
                                        </div>
                                    </div>
                                )}

                                {adminTab === 'products' && (
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        <div className="lg:col-span-1 bg-white rounded-xl shadow-lg p-6">

                                            <form onSubmit={handleAddProduct} className="space-y-4">
                                                <input required type="text" placeholder={t.pName} value={newProduct.name} onChange={e=>setNewProduct({...newProduct, name: e.target.value})} className="w-full border p-3 rounded-lg focus:ring-2 outline-none" />

                                                    <div className="w-1/2">
                                                        <label className="text-xs font-bold text-gray-500 block mb-1">{t.pCost}</label>
                                                        <input required type="number" placeholder="مثال: 5000" value={newProduct.costPrice} onChange={e=>setNewProduct({...newProduct, costPrice: e.target.value})} className="w-full border p-3 rounded-lg focus:ring-2 outline-none bg-orange-50" />
                                                    </div>
                                                    <div className="w-1/2">
                                                        <label className="text-xs font-bold text-gray-500 block mb-1">{t.pPrice}</label>
                                                        <input required type="number" placeholder="مثال: 8000" value={newProduct.price} onChange={e=>setNewProduct({...newProduct, price: e.target.value})} className="w-full border p-3 rounded-lg focus:ring-2 outline-none bg-green-50" />
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="text-xs font-bold text-gray-500 block mb-1">{t.deliveryFeeInput}</label>
                                                    <input required type="number" value={newProduct.deliveryFee} onChange={e=>setNewProduct({...newProduct, deliveryFee: e.target.value})} className="w-full border p-3 rounded-lg focus:ring-2 outline-none" />
                                                </div>
                                                <input required type="text" placeholder={t.pImg} value={newProduct.imageUrl} onChange={e=>setNewProduct({...newProduct, imageUrl: e.target.value})} className="w-full border p-3 rounded-lg focus:ring-2 outline-none" dir="ltr" />
                                                <select value={newProduct.category} onChange={e=>setNewProduct({...newProduct, category: e.target.value})} className="w-full border p-3 rounded-lg outline-none">
                                                    {CATEGORIES.filter(c=>c!=='الكل').map(c=><option key={c} value={c}>{c}</option>)}
                                                </select>
                                                <textarea placeholder={t.pDesc} value={newProduct.description} onChange={e=>setNewProduct({...newProduct, description: e.target.value})} className="w-full border p-3 rounded-lg focus:ring-2 outline-none" rows="3"></textarea>
                                                <button type="submit" className="w-full bg-amazon hover:bg-amazon-light text-white font-bold py-3 rounded-lg">{t.publish}</button>
                                            </form>
                                        </div>
                                        <div className="lg:col-span-2 bg-white rounded-xl shadow-lg p-6">
                                            <div className="flex justify-between mb-4">
                                                <h3 className="text-xl font-bold">إدارة المنتجات</h3>
                                                <input type="text" placeholder={t.adminSearch} value={adminSearch} onChange={e=>setAdminSearch(e.target.value)} className="border p-2 rounded w-64 outline-none" />
                                            </div>
                                            <div className="space-y-3 max-h-[600px] overflow-y-auto pr-2">
                                                {products.filter(p => p.name.includes(adminSearch) || (p.sku && p.sku.includes(adminSearch.toUpperCase()))).map(p => (
                                                    <div key={p.id} className="flex items-center gap-4 border p-3 rounded-lg hover:bg-gray-50">
                                                        <img src={p.imageUrl} className="w-16 h-16 object-contain rounded bg-white border" />
                                                        <div className="flex-1">
                                                            <span className="text-xs font-bold text-blue-600">{p.sku}</span>
                                                            <h4 className="font-bold line-clamp-1">{p.name}</h4>
                                                            <p className="text-amazon-orange font-bold">السعر: {Number(p.price).toLocaleString()} {t.currency}</p>
                                                            {p.costPrice && <p className="text-xs text-gray-500">التكلفة: {Number(p.costPrice).toLocaleString()} | الربح: {(Number(p.price) - Number(p.costPrice)).toLocaleString()}</p>}
                                                        </div>
                                                        <button onClick={()=>deleteProduct(p.id)} className="text-red-500 hover:bg-red-100 p-2 rounded font-bold">{t.delete}</button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {adminTab === 'sales' && (
                                    <div className="bg-white rounded-xl shadow-lg p-6">
                                        <h3 className="text-2xl font-black mb-6">{t.sales} / الإحصائيات</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="bg-blue-50 border-2 border-blue-200 p-8 rounded-2xl text-center shadow-sm">
                                                <div className="text-blue-500 text-5xl mb-4">📈</div>
                                                <p className="text-gray-700 font-black text-xl mb-2">{t.totalSales} (الطلبيات المقبولة)</p>
                                                <p className="text-4xl font-black text-blue-800">
                                                    {totalSalesSum.toLocaleString()} {t.currency}
                                                </p>
                                            </div>
                                            
                                            <div className="bg-green-50 border-2 border-green-200 p-8 rounded-2xl text-center shadow-sm">
                                                <div className="text-green-500 text-5xl mb-4">💰</div>
                                                <p className="text-gray-700 font-black text-xl mb-2">{t.profit} (الطلبيات المقبولة)</p>
                                                <p className="text-4xl font-black text-green-700">
                                                    {totalProfitSum.toLocaleString()} {t.currency}
                                                </p>
                                                <p className="text-sm text-green-600 mt-2 font-bold">(يتم حسابه: سعر البيع - التكلفة)</p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : null}
                    </main>

                    {/* Footer */}
                    <footer className="bg-amazon-light text-white text-center py-6 mt-auto no-print">
                        <p className="text-sm font-bold text-gray-400">
                            © <span onClick={handleSecretLogin} className="cursor-default select-none">2026</span> KE STORE. All rights reserved.
                        </p>
                    </footer>

                    {/* Product Details Modal */}
                    {selectedProduct && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 animate-fade-in no-print" onClick={()=>setSelectedProduct(null)}>
                            <div className="bg-white rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto flex flex-col md:flex-row relative" onClick={e=>e.stopPropagation()}>
                                <button onClick={()=>setSelectedProduct(null)} className="absolute top-4 right-4 bg-gray-100 hover:bg-gray-200 text-gray-800 p-2 rounded-full z-10 font-bold">X</button>
                                <div className="md:w-1/2 p-8 bg-gray-50 flex items-center justify-center">
                                    <img src={selectedProduct.imageUrl} className="w-full h-auto max-h-[400px] object-contain hover:scale-105 transition-transform" />
                                </div>
                                <div className="md:w-1/2 p-8 flex flex-col">
                                    <span className="text-sm text-amazon-orange font-bold mb-2">{selectedProduct.category} | {selectedProduct.sku}</span>
                                    <h2 className="text-2xl font-black mb-4">{selectedProduct.name}</h2>
                                    {renderStars()}
                                    <p className="text-3xl font-black text-gray-900 my-4">{Number(selectedProduct.price).toLocaleString()} {t.currency}</p>
                                    <div className="prose prose-sm mb-6 text-gray-600 border-t pt-4">
                                        <p>{selectedProduct.description || 'لا يوجد وصف متاح.'}</p>
                                    </div>
                                    <button onClick={()=>{addToCart(selectedProduct); setSelectedProduct(null);}} className="mt-auto w-full bg-amazon-yellow hover:bg-amazon-orange text-black font-black py-4 rounded-xl shadow-lg transition-transform hover:-translate-y-1 text-lg">
                                        {t.addCart}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Cart Drawer */}
                    {isCartOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex justify-end animate-fade-in no-print" onClick={()=>setIsCartOpen(false)}>
                            <div className="bg-white w-full max-w-md h-full flex flex-col shadow-2xl animate-slide-up" onClick={e=>e.stopPropagation()}>
                                <div className="p-4 bg-amazon-light text-white flex justify-between items-center shadow-md">
                                    <h2 className="text-xl font-black flex items-center gap-2">🛒 {t.cart}</h2>
                                    <button onClick={()=>setIsCartOpen(false)} className="text-white hover:text-red-400 font-bold text-xl">X</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                    {cart.length === 0 ? (
                                        <div className="text-center py-20 text-gray-400 font-bold">
                                            <p className="text-6xl mb-4">🛍️</p>
                                            <p>{t.emptyCart}</p>
                                        </div>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.id} className="flex gap-4 border-b pb-4 items-center bg-gray-50 p-2 rounded-lg">

                                                <div className="flex-1">
                                                    <h4 className="font-bold text-sm line-clamp-2">{item.name}</h4>
                                                    <p className="text-amazon-orange font-black mt-1">{Number(item.price).toLocaleString()} {t.currency}</p>
                                                    <div className="flex items-center gap-3 mt-2 bg-white w-fit border rounded-full px-2">
                                                        <button onClick={()=>updateQty(item.id, -1)} className="text-xl font-bold px-2 text-gray-600 hover:text-red-500">-</button>
                                                        <span className="font-black text-lg w-4 text-center">{item.qty}</span>
                                                        <button onClick={()=>updateQty(item.id, 1)} className="text-xl font-bold px-2 text-gray-600 hover:text-green-500">+</button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                                {cart.length > 0 && (
                                    <div className="p-6 bg-gray-50 border-t shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                                        <div className="flex justify-between text-lg font-bold text-gray-600 mb-1">
                                            <span>{t.total}:</span>
                                            <span>{cartTotalItemsPrice.toLocaleString()} {t.currency}</span>
                                        </div>
                                        <div className="flex justify-between text-lg font-bold text-gray-600 mb-3 border-b pb-2">
                                            <span>أجور التوصيل:</span>
                                            <span>{cartDeliveryFee.toLocaleString()} {t.currency}</span>
                                        </div>
                                        <div className="flex justify-between text-2xl font-black mb-4">
                                            <span>الكلي:</span>
                                            <span className="text-amazon-orange">{cartGrandTotal.toLocaleString()} {t.currency}</span>
                                        </div>
                                        <button onClick={()=>{setIsCartOpen(false); setIsCheckoutOpen(true);}} className="w-full bg-amazon-yellow hover:bg-amazon-orange text-black font-black py-4 rounded-xl shadow-lg transition-transform hover:scale-[1.02]">
                                            {t.checkout}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Checkout Modal */}
                    {isCheckoutOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4 animate-fade-in no-print" onClick={()=>setIsCheckoutOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-lg p-6 sm:p-8 shadow-2xl relative" onClick={e=>e.stopPropagation()}>
                                <button onClick={()=>setIsCheckoutOpen(false)} className="absolute top-4 right-4 text-gray-500 hover:text-red-500 font-bold">X</button>
                                <h2 className="text-2xl font-black mb-6 text-amazon-light border-b pb-2">{t.checkoutTitle}</h2>
                                <form onSubmit={handleOrderSubmit} className="space-y-4">
                                    <div>
                                        <label className="block font-bold mb-1 text-gray-700">{t.cName}</label>
                                        <input required type="text" value={orderForm.name} onChange={e=>setOrderForm({...orderForm, name: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-amazon-orange outline-none bg-gray-50 focus:bg-white transition-colors" />
                                    </div>
                                    <div>
                                        <label className="block font-bold mb-1 text-gray-700">{t.cPhone}</label>
                                        <input required type="tel" value={orderForm.phone} onChange={e=>setOrderForm({...orderForm, phone: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-amazon-orange outline-none bg-gray-50 focus:bg-white transition-colors text-left" dir="ltr" placeholder="07..." />
                                    </div>
                                    <div>
                                        <label className="block font-bold mb-1 text-gray-700">{t.cAddress}</label>
                                        <input required type="text" value={orderForm.address} onChange={e=>setOrderForm({...orderForm, address: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-amazon-orange outline-none bg-gray-50 focus:bg-white transition-colors" placeholder="المدينة، الحي، أقرب نقطة دالة..." />
                                    </div>
                                    <div>
                                        <label className="block font-bold mb-1 text-gray-700">{t.cNotes}</label>
                                        <textarea value={orderForm.notes} onChange={e=>setOrderForm({...orderForm, notes: e.target.value})} className="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-amazon-orange outline-none bg-gray-50 focus:bg-white transition-colors" rows="2"></textarea>
                                    </div>
                                    
                                    <div className="bg-gray-100 p-4 rounded-lg space-y-2 mb-4">
                                        <div className="flex justify-between font-bold text-gray-600">
                                            <span>مجموع السلع:</span>
                                            <span>{cartTotalItemsPrice.toLocaleString()} {t.currency}</span>
                                        </div>
                                        <div className="flex justify-between font-bold text-gray-600 border-b border-gray-300 pb-2">
                                            <span>التوصيل:</span>
                                            <span>{cartDeliveryFee.toLocaleString()} {t.currency}</span>
                                        </div>
                                        <div className="flex justify-between font-black text-xl text-amazon-orange pt-1">
                                            <span>المطلوب دفعه:</span>
                                            <span>{cartGrandTotal.toLocaleString()} {t.currency}</span>
                                        </div>
                                    </div>
                                    
                                    <button type="submit" className="w-full bg-amazon hover:bg-amazon-light text-white font-black py-4 rounded-xl shadow-lg transition-transform hover:-translate-y-1 text-lg">
                                        {t.confirmOrder}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Success Modal */}
                    {isSuccessOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[120] flex items-center justify-center p-4 animate-fade-in no-print">
                            <div className="bg-white rounded-3xl w-full max-w-sm p-8 text-center shadow-2xl animate-pop border-4 border-green-400">
                                <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <span className="text-6xl">✓</span>
                                </div>
                                <h2 className="text-3xl font-black mb-2 text-green-600">{t.successMsg}</h2>
                                <p className="text-gray-600 mb-8 font-bold">{t.successSub}</p>
                                <button onClick={()=>{setIsSuccessOpen(false); setPage('home');}} className="w-full bg-amazon hover:bg-amazon-light text-white font-black py-4 rounded-xl shadow-lg transition-transform hover:scale-105">
                                    {t.backToHome}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
