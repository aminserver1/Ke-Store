                                                </select>
                                                <textarea placeholder={t.pDesc} value={newProduct.description} onChange={e=>setNewProduct({...newProduct, description: e.target.value})} className="w-full border p-3 rounded-lg outline-none" rows="2"></textarea>
                                                <button type="submit" className="w-full bg-amazon text-white font-bold py-3 rounded-lg">{t.publish}</button>
                                            </form>
                                        </div>
                                        <div className="lg:col-span-2 space-y-4">
                                            <input type="text" placeholder={t.adminSearch} value={adminSearch} onChange={e=>setAdminSearch(e.target.value)} className="w-full border p-3 rounded-xl outline-none" />
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                {products.filter(p=>(p.name || '').toLowerCase().includes(adminSearch.toLowerCase())).map(p=>(
                                                    <div key={p.id} className="flex justify-between items-center border p-3 rounded-xl bg-white shadow-sm">
                                                        <div className="flex items-center gap-3">
                                                            <img src={p.imageUrl} className="w-12 h-12 object-contain" />
                                                            <div>
                                                                <h4 className="font-bold text-xs line-clamp-1">{p.name}</h4>
                                                                <span className="text-amazon-orange font-bold text-xs">{p.price}</span>
                                                            </div>
                                                        </div>
                                                        <button onClick={()=>deleteItem('products', p.id)} className="text-red-500">
                                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {adminTab === 'slider' && (
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                            <h3 className="text-xl font-bold mb-4">{t.addOffer}</h3>
                                            <form onSubmit={handleAddSlider} className="space-y-4">
                                                <input type="text" placeholder={t.offerTitle} value={newSlider.title} onChange={e=>setNewSlider({...newSlider, title: e.target.value})} className="w-full border p-3 rounded-lg outline-none" />
                                                <input required type="text" placeholder={t.pImg} value={newSlider.imageUrl} onChange={e=>setNewSlider({...newSlider, imageUrl: e.target.value})} className="w-full border p-3 rounded-lg outline-none" dir="ltr" />
                                                
                                                <div className="relative">
                                                    <label className="block text-xs font-bold text-gray-500 mb-1">{t.searchItem}</label>
                                                    <input type="text" placeholder={t.search} value={sliderProductSearch} onChange={e=>setSliderProductSearch(e.target.value)} className="w-full border p-3 rounded-lg outline-none focus:border-purple-500" />
                                                    {sliderProductSearch && (
                                                        <div className="absolute z-10 w-full bg-white border mt-1 rounded-lg shadow-xl max-h-48 overflow-y-auto">
                                                            <div onClick={()=>{setNewSlider({...newSlider, productId: ''}); setSliderProductSearch('');}} className="p-2 hover:bg-gray-100 cursor-pointer text-sm font-bold border-b text-red-500">بێ بەستەرەوە / بدون رابط</div>
                                                            {products.filter(p=>(p.name || '').toLowerCase().includes(sliderProductSearch.toLowerCase())).map(p=>(
                                                                <div key={p.id} onClick={()=>{
                                                                    setNewSlider({...newSlider, productId: p.id});
                                                                    setSliderProductSearch(p.name);
                                                                }} className="p-2 hover:bg-gray-100 cursor-pointer text-xs flex items-center gap-2 border-b">
                                                                    <img src={p.imageUrl} className="w-6 h-6 object-contain" />
                                                                    <span>{p.name}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>

                                                <button type="submit" className="w-full bg-purple-600 text-white font-bold py-3 rounded-lg">إضافة العرض</button>
                                            </form>
                                        </div>
                                        <div className="space-y-4">
                                            {sliders.map(s => (
                                                <div key={s.id} className="border bg-white p-3 rounded-xl flex items-center gap-4">
                                                    <img src={s.imageUrl} className="w-20 h-12 object-cover rounded" />
                                                    <div className="flex-1">
                                                        <div className="font-bold text-xs">{s.title || 'No Title'}</div>
                                                        {s.productId && <div className="text-[10px] text-blue-600 font-bold">Linked to Item</div>}
                                                    </div>
                                                    <button onClick={()=>deleteItem('sliders', s.id)} className="text-red-500">
                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : null}
                    </main>

                    {selectedProduct && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex justify-center items-center p-4 md:p-8 animate-fade-in" onClick={() => setSelectedProduct(null)}>
                            <div className="bg-white rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto flex flex-col md:flex-row shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                <div className="absolute top-4 right-4 z-10 flex gap-2">
                                    <button onClick={() => handleShare(selectedProduct.id)} className="bg-blue-100 text-blue-800 rounded-full p-2 transition-colors">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                                    </button>
                                    <button onClick={() => setSelectedProduct(null)} className="bg-gray-100 text-gray-800 rounded-full p-2">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                                <div className="md:w-1/2 p-4 flex items-center justify-center bg-gray-50 border-b md:border-b-0 md:border-l border-gray-200 pt-14 md:pt-4 overflow-hidden">
                                    <img src={selectedProduct.imageUrl} className="max-w-full max-h-[40vh] md:max-h-[60vh] object-contain rounded-lg zoom-img" title="Zoom" />
                                </div>
                                <div className="md:w-1/2 p-6 md:p-8 flex flex-col pt-4 md:pt-8">
                                    <span className="text-xs text-gray-400 mb-2">{selectedProduct.category} • {selectedProduct.sku}</span>
                                    <h2 className="text-xl md:text-2xl font-black mb-4 text-gray-900">{selectedProduct.name}</h2>
                                    {renderStars()}
                                    <div className="text-3xl font-black text-amazon-orange my-4">{(Number(selectedProduct.price)||0).toLocaleString()} {t.currency}</div>
                                    <div className="bg-gray-50 p-4 rounded-xl mb-6 flex-1 overflow-y-auto border border-gray-100">
                                        <p className="whitespace-pre-wrap text-gray-600 leading-relaxed text-sm">{selectedProduct.description || 'No description available.'}</p>
                                    </div>
                                    <div className="flex gap-3 items-center">
                                        <div className="flex items-center gap-3 bg-gray-100 rounded-xl p-2 border border-gray-200">
                                            <button onClick={() => setSelectedQty(Math.max(1, selectedQty - 1))} className="w-10 h-10 flex items-center justify-center bg-white rounded-lg shadow-sm text-xl font-bold">-</button>
                                            <span className="font-black text-lg w-6 text-center">{selectedQty}</span>
                                            <button onClick={() => setSelectedQty(selectedQty + 1)} className="w-10 h-10 flex items-center justify-center bg-white rounded-lg shadow-sm text-xl font-bold">+</button>
                                        </div>
                                        <button onClick={() => { addToCart(selectedProduct, selectedQty); setSelectedProduct(null); }} className="flex-1 h-14 bg-amazon-yellow hover:bg-amazon-orange text-black font-bold rounded-xl text-lg flex justify-center items-center gap-2">
                                            {t.addCart}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {isCartOpen && (
                        <div className="fixed inset-0 bg-black/70 z-[110] flex justify-center items-center p-4" onClick={() => setIsCartOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-lg max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl">
                                    <h2 className="font-bold text-xl">{t.cart}</h2>
                                    <button onClick={() => setIsCartOpen(false)}><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                </div>
                                <div className="p-4 flex-1 overflow-y-auto">
                                    {cart.length === 0 ? <p className="text-center py-10 text-gray-400 font-bold">{t.emptyCart}</p> : 
                                        cart.map(c => (
                                            <div key={c.id} className="flex justify-between items-center mb-4 border p-3 rounded-xl bg-white shadow-sm">
                                                <img src={c.imageUrl} className="w-12 h-12 object-contain" />
                                                <div className="flex-1 px-3">
                                                    <h4 className="font-bold text-xs line-clamp-1">{c.name}</h4>
                                                    <p className="text-amazon-orange font-black text-xs">{(Number(c.price)||0).toLocaleString()} {t.currency}</p>
                                                </div>
                                                <div className="flex items-center gap-2 bg-gray-100 rounded-lg p-1">
                                                    <button onClick={() => updateQty(c.id, -1)} className="w-6 h-6 flex items-center justify-center bg-white rounded shadow-sm font-bold">-</button>
                                                    <span className="font-bold w-4 text-center text-xs">{c.qty}</span>
                                                    <button onClick={() => updateQty(c.id, 1)} className="w-6 h-6 flex items-center justify-center bg-white rounded shadow-sm font-bold">+</button>
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>
                                {cart.length > 0 && (
                                    <div className="p-4 border-t bg-gray-50 rounded-b-2xl">
                                        <div className="flex justify-between items-center mb-4 font-bold">
                                            <span>{t.total}:</span>
                                            <span className="text-xl text-amazon-orange">{cartTotalItemsPrice.toLocaleString()} {t.currency}</span>
                                        </div>
                                        <button onClick={() => { setIsCartOpen(false); setIsCheckoutOpen(true); }} className="w-full bg-amazon-yellow text-black py-3 font-bold rounded-xl text-lg">
                                            {t.checkout}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {isCheckoutOpen && (
                        <div className="fixed inset-0 bg-black/70 z-[110] flex justify-center items-center p-4" onClick={() => setIsCheckoutOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="p-4 border-b flex justify-between items-center bg-amazon text-white rounded-t-2xl">
                                    <h2 className="text-xl font-bold">{t.checkoutTitle}</h2>
                                    <button onClick={() => setIsCheckoutOpen(false)}><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                </div>
                                <div className="p-6">
                                    <form onSubmit={handleOrderSubmit} className="space-y-4">
                                        <input required placeholder={t.cName} value={orderForm.name} onChange={e => setOrderForm({...orderForm, name: e.target.value})} className="w-full border p-3 rounded-lg outline-none" />
                                        <input required type="tel" placeholder={t.cPhone} value={orderForm.phone} onChange={e => setOrderForm({...orderForm, phone: e.target.value})} className="w-full border p-3 rounded-lg outline-none" dir="ltr" />
                                        <input required placeholder={t.cAddress} value={orderForm.address} onChange={e => setOrderForm({...orderForm, address: e.target.value})} className="w-full border p-3 rounded-lg outline-none" />
                                        <textarea placeholder={t.cNotes} value={orderForm.notes} onChange={e => setOrderForm({...orderForm, notes: e.target.value})} className="w-full border p-3 rounded-lg outline-none" rows="2"></textarea>
                                        <div className="bg-gray-100 p-4 rounded-xl text-sm">
                                            <div className="flex justify-between mb-1"><span>{t.total}:</span><span className="font-bold">{cartTotalItemsPrice.toLocaleString()} {t.currency}</span></div>
                                            <div className="flex justify-between border-t pt-2 text-red-600 font-black text-lg"><span>Total:</span><span>{cartGrandTotal.toLocaleString()} {t.currency}</span></div>
                                        </div>
                                        <button type="submit" className="w-full bg-amazon-orange text-white py-4 rounded-xl font-black text-lg shadow-lg">
                                            {t.confirmOrder}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {isSuccessOpen && (
                        <div className="fixed inset-0 bg-black/80 z-[120] flex justify-center items-center p-4" onClick={() => setIsSuccessOpen(false)}>
                            <div className="bg-white rounded-2xl p-8 text-center max-w-sm w-full animate-pop">
                                <div className="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <h2 className="text-2xl font-black mb-3">{t.successMsg}</h2>
                                <p className="text-gray-600 mb-6 font-bold">{t.successSub}</p>
                                <div className="bg-gray-100 p-3 rounded-lg mb-6 border-2 border-dashed">
                                    <p className="text-xs text-gray-500">{t.invoiceNo}</p>
                                    <h3 className="text-xl font-black text-amazon-orange" dir="ltr">{lastOrderInvoice}</h3>
                                </div>
                                <button onClick={() => setIsSuccessOpen(false)} className="w-full bg-amazon text-white py-3 rounded-xl font-bold">{t.backToHome}</button>
                            </div>
                        </div>
                    )}

                    {isContactOpen && (
                        <div className="fixed inset-0 bg-black/70 z-[120] flex justify-center items-center p-4 no-print" onClick={()=>setIsContactOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-sm text-center p-6 animate-pop" onClick={e=>e.stopPropagation()}>
                                <h2 className="text-xl font-black mb-4">{t.contactUs}</h2>
                                <a href="https://wa.me/9647800041290" target="_blank" className="w-full bg-green-500 text-white font-black py-4 rounded-xl flex items-center justify-center gap-2">WhatsApp</a>
                                <button onClick={()=>setIsContactOpen(false)} className="mt-4 text-gray-400 font-bold underline">{t.backToHome}</button>
                            </div>
                        </div>
                    )}

                    {isNotifOpen && (
                        <div className="fixed inset-0 bg-black/70 z-[110] flex justify-center items-start pt-20 px-4 no-print" onClick={()=>setIsNotifOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-md max-h-[70vh] overflow-hidden flex flex-col" onClick={e=>e.stopPropagation()}>
                                <div className="bg-amazon text-white p-4 flex justify-between items-center font-bold">
                                    <span>{t.notifications}</span>
                                    <button onClick={()=>setIsNotifOpen(false)}><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                </div>
                                <div className="overflow-y-auto p-4 space-y-3 bg-gray-50 flex-1">
                                    {notifications.length === 0 ? <p className="text-center text-gray-500 py-10">{t.noNotif}</p> : 
                                        notifications.map(n => (
                                            <div key={n.id} className="bg-white p-4 rounded-xl shadow-sm border-r-4 border-r-blue-500">
                                                <h4 className="font-bold text-sm mb-1">{n.title}</h4>
                                                <p className="text-gray-700 text-xs">{n.message}</p>
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
