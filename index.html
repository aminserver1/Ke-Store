            useEffect(() => {
                document.documentElement.dir = lang === 'en' ? 'ltr' : 'rtl';
                document.documentElement.lang = lang;
            }, [lang]);

            const changeLanguage = () => {
                const nextLang = lang === 'ar' ? 'ku' : (lang === 'ku' ? 'en' : 'ar');
                setLang(nextLang);
                localStorage.setItem('lang', nextLang);
            };

            const [page, setPage] = useState('home');
            const [isAdmin, setIsAdmin] = useState(false);
            const [products, setProducts] = useState([]);
            const [orders, setOrders] = useState([]);
            const [notifications, setNotifications] = useState([]);
            const [sliders, setSliders] = useState([]);
            const [coupons, setCoupons] = useState([]);
            
            const [cart, setCart] = useState([]);

            const [isNotifOpen, setIsNotifOpen] = useState(false);
            const [isContactOpen, setIsContactOpen] = useState(false);

            const [selectedProduct, setSelectedProduct] = useState(null); 
            const [activeDialogImg, setActiveDialogImg] = useState('');
            const [selectedQty, setSelectedQty] = useState(1);
            
            const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
            const [isSuccessOpen, setIsSuccessOpen] = useState(false);
            const [lastOrderInvoice, setLastOrderInvoice] = useState('');
            
            const [toastMsg, setToastMsg] = useState('');
            const [orderForm, setOrderForm] = useState({ name: '', phone: '', address: '', notes: '' });
            const [couponInput, setCouponInput] = useState('');
            const [appliedCoupon, setAppliedCoupon] = useState(null);

            const [adminTab, setAdminTab] = useState('orders');
            const [adminSearch, setAdminSearch] = useState('');
            const [orderSearchText, setOrderSearchText] = useState('');
            const [sliderSearchInput, setSliderSearchInput] = useState('');
            
            const [newProduct, setNewProduct] = useState({ name: '', price: '', costPrice: '', deliveryFee: 5000, imageUrl: '', image2: '', image3: '', image4: '', description: '', category: 'إلكترونيات' });
            const [newNotif, setNewNotif] = useState({ title: '', message: '', imageUrl: '' });
            const [newSlider, setNewSlider] = useState({ title: '', imageUrl: '', productId: '', productName: '' });
            const [newCoupon, setNewCoupon] = useState({ code: '', percentage: '' });
            
            const [printingOrder, setPrintingOrder] = useState(null);
            const [printType, setPrintType] = useState('invoice'); 

            const t = TR[lang];
            let clickCount = useRef(0);
            let clickTimer = useRef(null);

            useEffect(() => {
                const pRef = db.ref('products');
                pRef.on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const prods = Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse();
                        setProducts(prods);
                        
                        const params = new URLSearchParams(window.location.search);
                        const pid = params.get('productId');
                        if (pid) {
                            const found = prods.find(p => p.id === pid);
                            if (found) {
                                setSelectedProduct(found);
                                setActiveDialogImg(found.imageUrl);
                            }
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    }
                    else setProducts([]);
                });

                const oRef = db.ref('orders');
                oRef.on('value', snap => {
                    const data = snap.val();
                    if (data) setOrders(Object.keys(data).map(key => ({ id: key, ...data[key] })));
                    else setOrders([]);
                });

                const nRef = db.ref('KESTOREnotification');
                nRef.on('value', snap => {
                    const data = snap.val();
                    if (data) setNotifications(Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse());
                    else setNotifications([]);
                });

                const sRef = db.ref('sliders');
                sRef.on('value', snap => {
                    const data = snap.val();
                    if (data) setSliders(Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse());
                    else setSliders([]);
                });

                const cRef = db.ref('coupons');
                cRef.on('value', snap => {
                    const data = snap.val();
                    if (data) setCoupons(Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse());
                    else setCoupons([]);
                });

                return () => { pRef.off(); oRef.off(); nRef.off(); sRef.off(); cRef.off(); };
            }, []);

            useEffect(() => {
                setSelectedQty(1);
            }, [selectedProduct]);

            const handleSecretLogin = () => {
                if (search.trim() === "tafteshok@gmail.com") {
                    clickCount.current += 1;
                    if (clickCount.current >= 6) {
                        clickCount.current = 0;
                        setSearch(''); 
                        if (!isAdmin) {
                            const password = window.prompt("Admin Password:");
                            if (password === "224080") {
                                setIsAdmin(true);
                                setPage('admin');
                                showToast("بەخێربێیت بۆ پەناڵی ئەدمین");
                            } else {
                                alert("Authentication Failed");
                            }
                        } else {
                            setPage('admin');
                        }
                    }
                    clearTimeout(clickTimer.current);
                    clickTimer.current = setTimeout(() => { clickCount.current = 0; }, 3000);
                } else {
                    setPage('home');
                }
            };

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            const handleShare = (productId) => {
                const url = `${window.location.origin}${window.location.pathname}?productId=${productId}`;
                if (navigator.share) {
                    navigator.share({
                        title: 'KESTORE',
                        text: 'شاهد هذا المنتج المميز / سەیری ئەم کاڵایە بکە',
                        url: url
                    }).catch(console.error);
                } else {
                    navigator.clipboard.writeText(url);
                    showToast(t.copyLink);
                }
            };

            const addToCart = (product, qty = 1) => {
                const exist = cart.find(x => x.id === product.id);
                if (exist) setCart(cart.map(x => x.id === product.id ? { ...exist, qty: exist.qty + qty } : x));
                else setCart([...cart, { ...product, qty: qty }]);
                showToast(t.addedToCart);
            };

            const updateQty = (id, amount) => {
                const exist = cart.find(x => x.id === id);
                if (exist.qty === 1 && amount === -1) setCart(cart.filter(x => x.id !== id));
                else setCart(cart.map(x => x.id === id ? { ...exist, qty: exist.qty + amount } : x));
            };

            const cartTotalItemsPrice = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const cartDeliveryFee = cart.length > 0 ? Math.max(...cart.map(item => Number(item.deliveryFee) || 5000)) : 0;
            const discountAmount = appliedCoupon ? (cartTotalItemsPrice * (appliedCoupon.percentage / 100)) : 0;
            const cartGrandTotal = cartTotalItemsPrice - discountAmount + cartDeliveryFee;

            const handleApplyCoupon = (e) => {
                e.preventDefault();
                if(!couponInput.trim()) return;
                const found = coupons.find(c => c.code.toLowerCase() === couponInput.trim().toLowerCase());
                if (found) {
                    setAppliedCoupon(found);
                    showToast(t.couponApplied);
                } else {
                    setAppliedCoupon(null);
                    showToast(t.invalidCoupon);
                }
            };

            const handleOrderSubmit = (e) => {
                e.preventDefault();
                const invoiceId = 'INV-' + Math.floor(100000 + Math.random() * 900000);
                
                db.ref('orders').push({
                    invoiceId,
                    customer: orderForm,
                    items: cart,
                    cartTotal: cartTotalItemsPrice,
                    deliveryFee: cartDeliveryFee,
                    discount: discountAmount,
                    couponUsed: appliedCoupon ? appliedCoupon.code : '',
                    total: cartGrandTotal, 
                    date: new Date().toISOString(),
                    status: 'pending'
                });
                
                setLastOrderInvoice(invoiceId);
                setIsCheckoutOpen(false);
                setIsSuccessOpen(true);
                setCart([]);
                setAppliedCoupon(null);
                setCouponInput('');
                setOrderForm({ name: '', phone: '', address: '', notes: '' });
            };

            const searchTerms = search.toLowerCase().trim().split(/\s+/);
            const filteredProducts = products.filter(p => {
                const matchCat = activeCat === 'الكل' || p.category === activeCat;
                const searchString = `${p.name || ''} ${p.description || ''} ${p.sku || p.id}`.toLowerCase();
                const matchSearch = searchTerms.every(term => searchString.includes(term));
                return matchCat && matchSearch;
            });

            const handleAddProduct = (e) => {
                e.preventDefault();
                const sku = 'ITM-' + Math.floor(1000 + Math.random() * 9000);
                db.ref('products').push({ 
                    ...newProduct, 
                    sku, 
                    price: Number(newProduct.price),
                    costPrice: Number(newProduct.costPrice || 0),
                    deliveryFee: Number(newProduct.deliveryFee || 5000),
                    createdAt: new Date().toISOString()
                });
                setNewProduct({ name: '', price: '', costPrice: '', deliveryFee: 5000, imageUrl: '', image2: '', image3: '', image4: '', description: '', category: 'إلكترونيات' });
                showToast("تمت إضافة المنتج بنجاح");
            };

            const handleAddNotif = (e) => {
                e.preventDefault();
                db.ref('KESTOREnotification').push({ ...newNotif, date: new Date().toISOString() });
                setNewNotif({ title: '', message: '', imageUrl: '' });
                showToast("تم إرسال الإشعار");
            };

            const handleAddSlider = (e) => {
                e.preventDefault();
                db.ref('sliders').push(newSlider);
                setNewSlider({ title: '', imageUrl: '', productId: '', productName: '' });
                setSliderSearchInput('');
                showToast("تم إضافة العرض");
            };

            const handleAddCoupon = (e) => {
                e.preventDefault();

                                                <input required type="number" placeholder={t.discountPercentage} value={newCoupon.percentage} onChange={e=>setNewCoupon({...newCoupon, percentage: e.target.value})} className="w-full border border-gray-300 p-3 rounded-lg outline-none" min="1" max="100" />
                                                <button type="submit" className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-colors">{t.addCoupon}</button>
                                            </form>
                                        </div>
                                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 overflow-y-auto max-h-[500px] hide-scroll">
                                            {coupons.map(c => (
                                                <div key={c.id} className="border border-green-200 bg-green-50 p-4 mb-3 rounded-lg flex justify-between items-center">
                                                    <div>
                                                        <h4 className="font-black text-xl text-green-800" dir="ltr">{c.code}</h4>
                                                        <p className="text-sm font-bold text-gray-700 mt-1">الخصم: {c.percentage}%</p>
                                                    </div>
                                                    <button onClick={()=>deleteItem('coupons', c.id)} className="text-red-500 hover:bg-red-100 p-2 rounded">
                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : null}
                    </main>

                    {selectedProduct && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex justify-center items-center p-4 md:p-8 animate-fade-in" onClick={() => setSelectedProduct(null)}>
                            <div className="bg-white rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto flex flex-col md:flex-row shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                <div className="absolute top-4 right-4 z-10 flex gap-2">
                                    <button onClick={() => handleShare(selectedProduct.id)} className="bg-blue-100 hover:bg-blue-200 text-blue-800 rounded-full p-2 transition-colors flex items-center gap-1 shadow" title={t.share}>
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                                    </button>
                                    <button onClick={() => setSelectedProduct(null)} className="bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-full p-2 transition-colors shadow">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                                
                                <div className="md:w-1/2 p-4 flex flex-col items-center justify-start bg-gray-50 border-b md:border-b-0 md:border-l border-gray-200 pt-14 md:pt-6">
                                    <img src={activeDialogImg || selectedProduct.imageUrl} className="w-full max-h-[40vh] md:max-h-[50vh] object-contain rounded-lg mb-4 bg-white p-2 border border-gray-100 shadow-sm transition-opacity duration-300" />
                                    <div className="flex gap-2 overflow-x-auto hide-scroll w-full justify-center px-2 py-1">
                                        {[selectedProduct.imageUrl, selectedProduct.image2, selectedProduct.image3, selectedProduct.image4].filter(Boolean).map((img, idx) => (
                                            <img key={idx} src={img} onClick={() => setActiveDialogImg(img)} className={`w-16 h-16 md:w-20 md:h-20 object-cover rounded-lg cursor-pointer border-2 shadow-sm transition-transform hover:scale-105 ${activeDialogImg===img ? 'border-amazon-orange' : 'border-transparent bg-white'}`} />
                                        ))}
                                    </div>
                                </div>

                                <div className="md:w-1/2 p-6 md:p-8 flex flex-col pt-4 md:pt-8">
                                    <span className="text-sm text-gray-400 mb-2">{selectedProduct.category} • {selectedProduct.sku}</span>
                                    <h2 className="text-2xl md:text-3xl font-black mb-4 text-gray-900">{selectedProduct.name}</h2>
                                    {renderStars()}
                                    <div className="text-3xl font-black text-amazon-orange my-4">{(Number(selectedProduct.price)||0).toLocaleString()} {t.currency}</div>
                                    
                                    <div className="bg-gray-50 p-4 rounded-xl mb-6 flex-1 overflow-y-auto hide-scroll border border-gray-100">
                                        <h3 className="font-bold text-lg mb-2 text-gray-800 border-b pb-2">التفاصيل والمواصفات:</h3>
                                        <p className="whitespace-pre-wrap text-gray-600 leading-relaxed">{selectedProduct.description || 'لا يوجد وصف متاح.'}</p>
                                    </div>

                                    <div className="flex gap-3 items-center">
                                        <div className="flex items-center gap-3 bg-gray-100 rounded-xl p-2 border border-gray-200 h-14">
                                            <button onClick={() => setSelectedQty(Math.max(1, selectedQty - 1))} className="w-10 h-10 flex items-center justify-center bg-white rounded-lg shadow-sm text-xl font-bold text-gray-600 hover:text-red-500">-</button>
                                            <span className="font-black text-lg w-6 text-center">{selectedQty}</span>
                                            <button onClick={() => setSelectedQty(selectedQty + 1)} className="w-10 h-10 flex items-center justify-center bg-white rounded-lg shadow-sm text-xl font-bold text-green-600 hover:text-green-700">+</button>
                                        </div>
                                        <button onClick={() => { addToCart(selectedProduct, selectedQty); setSelectedProduct(null); }} className="flex-1 h-14 bg-amazon-yellow hover:bg-amazon-orange text-black font-bold rounded-xl text-lg flex justify-center items-center gap-2 transition-colors shadow-md">
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                            {t.addCart}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {isCartOpen && (
                        <div className="fixed inset-0 bg-black/70 z-[110] flex justify-center items-center p-4 animate-fade-in" onClick={() => setIsCartOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-lg max-h-[85vh] flex flex-col shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl">
                                    <h2 className="font-bold text-xl flex items-center gap-2">
                                        <svg className="w-6 h-6 text-amazon-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                        {t.cart}
                                    </h2>
                                    <button onClick={() => setIsCartOpen(false)} className="text-gray-500 hover:text-red-500 bg-gray-200 hover:bg-red-100 rounded-full p-1 transition-colors">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                                <div className="p-4 flex-1 overflow-y-auto hide-scroll">
                                    {cart.length === 0 ? (
                                        <div className="text-center py-10 text-gray-400">
                                            <svg className="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                                            <p className="font-bold text-lg">{t.emptyCart}</p>
                                        </div>
                                    ) : cart.map(c => (
                                        <div key={c.id} className="flex justify-between items-center mb-4 border border-gray-100 p-3 rounded-xl bg-white shadow-sm">
                                            <img src={c.imageUrl} className="w-16 h-16 object-contain rounded-lg border border-gray-50 bg-gray-50" />
                                            <div className="flex-1 px-3">
                                                <h4 className="font-bold text-gray-800 line-clamp-1">{c.name}</h4>
                                                <p className="text-amazon-orange font-black text-sm mt-1">{(Number(c.price)||0).toLocaleString()} {t.currency}</p>
                                            </div>
                                            <div className="flex items-center gap-3 bg-gray-100 rounded-lg p-1 border border-gray-200">
                                                <button onClick={() => updateQty(c.id, -1)} className="w-8 h-8 flex items-center justify-center bg-white rounded shadow-sm text-lg font-bold text-gray-600 hover:text-red-500">-</button>
                                                <span className="font-bold w-4 text-center">{c.qty}</span>
                                                <button onClick={() => updateQty(c.id, 1)} className="w-8 h-8 flex items-center justify-center bg-white rounded shadow-sm text-lg font-bold text-green-600 hover:text-green-700">+</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {cart.length > 0 && (
                                    <div className="p-4 border-t bg-gray-50 rounded-b-2xl">
                                        <div className="flex justify-between items-center mb-4 font-bold text-lg">
                                            <span className="text-gray-600">{t.total}:</span>
                                            <span className="text-2xl text-amazon-orange">{cartTotalItemsPrice.toLocaleString()} {t.currency}</span>
                                        </div>
                                        <button onClick={() => { setIsCartOpen(false); setIsCheckoutOpen(true); }} className="w-full bg-amazon-yellow hover:bg-amazon-orange text-black py-3 font-bold rounded-xl transition-colors shadow-md text-lg">
                                            {t.checkout}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {isCheckoutOpen && (
                        <div className="fixed inset-0 bg-black/70 z-[110] flex justify-center items-center p-4 animate-fade-in" onClick={() => setIsCheckoutOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto flex flex-col shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="p-4 border-b flex justify-between items-center bg-amazon text-white rounded-t-2xl">
                                    <h2 className="text-xl font-bold flex items-center gap-2">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                        {t.checkoutTitle}
                                    </h2>
                                    <button onClick={() => setIsCheckoutOpen(false)} className="text-gray-300 hover:text-white">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                                <div className="p-6">
                                    <form onSubmit={handleOrderSubmit} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">{t.cName}</label>
                                            <input required placeholder={t.cName} value={orderForm.name} onChange={e => setOrderForm({...orderForm, name: e.target.value})} className="w-full border border-gray-300 p-3 rounded-lg outline-none focus:border-amazon-orange bg-gray-50" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">{t.cPhone}</label>
                                            <input required type="tel" placeholder="0750 XXX XXXX" value={orderForm.phone} onChange={e => setOrderForm({...orderForm, phone: e.target.value})} className="w-full border border-gray-300 p-3 rounded-lg outline-none focus:border-amazon-orange bg-gray-50" dir="ltr" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">{t.cAddress}</label>
                                            <input required placeholder={t.cAddress} value={orderForm.address} onChange={e => setOrderForm({...orderForm, address: e.target.value})} className="w-full border border-gray-300 p-3 rounded-lg outline-none focus:border-amazon-orange bg-gray-50" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">{t.cNotes}</label>
                                            <textarea placeholder={t.cNotes} value={orderForm.notes} onChange={e => setOrderForm({...orderForm, notes: e.target.value})} className="w-full border border-gray-300 p-3 rounded-lg outline-none focus:border-amazon-orange bg-gray-50" rows="2"></textarea>
                                        </div>
                                        
                                        <div className="bg-green-50 p-3 rounded-lg border border-green-200 mt-2">
                                            <label className="block text-sm font-bold text-gray-700 mb-1">{t.couponCode}</label>
                                            <div className="flex gap-2">
                                                <input type="text" placeholder={t.couponCode} value={couponInput} onChange={e => setCouponInput(e.target.value)} className="w-full border border-gray-300 p-2 rounded outline-none uppercase" dir="ltr" />
                                                <button type="button" onClick={handleApplyCoupon} className="bg-green-600 text-white px-4 font-bold rounded hover:bg-green-700 whitespace-nowrap">{t.apply}</button>
                                            </div>
                                            {appliedCoupon && <p className="text-green-600 font-bold text-sm mt-2">{t.couponApplied} ({appliedCoupon.percentage}%)</p>}
                                        </div>

                                        <div className="bg-gray-100 p-4 rounded-xl border border-gray-200 mt-6">
                                            <div className="flex justify-between items-center mb-2 text-gray-600">
                                                <span>المجموع:</span>
                                                <span className="font-bold">{cartTotalItemsPrice.toLocaleString()} {t.currency}</span>
                                            </div>
                                            <div className="flex justify-between items-center mb-2 text-gray-600">
                                                <span>أجور التوصيل:</span>
                                                <span className="font-bold">{cartDeliveryFee.toLocaleString()} {t.currency}</span>
                                            </div>
                                            {appliedCoupon && (
                                                <div className="flex justify-between items-center mb-4 text-green-600 pb-4 border-b border-gray-300">
                                                    <span>{t.discount} ({appliedCoupon.percentage}%):</span>
                                                    <span className="font-bold">- {discountAmount.toLocaleString()} {t.currency}</span>
                                                </div>
                                            )}
                                            <div className={`flex justify-between items-center text-xl font-black ${appliedCoupon ? '' : 'pt-4 border-t border-gray-300 mt-2'} text-red-600`}>
                                                <span>المجموع الكلي:</span>
                                                <span>{cartGrandTotal.toLocaleString()} {t.currency}</span>
                                            </div>
                                        </div>
                                        
                                        <button type="submit" className="w-full bg-amazon-orange hover:bg-orange-500 text-white py-4 rounded-xl font-black text-lg transition-colors shadow-lg mt-4 flex justify-center items-center gap-2">
                                            {t.confirmOrder}
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {isSuccessOpen && (
                        <div className="fixed inset-0 bg-black/80 z-[120] flex justify-center items-center p-4 animate-fade-in" onClick={() => setIsSuccessOpen(false)}>
                            <div className="bg-white rounded-2xl p-8 text-center max-w-sm w-full shadow-2xl animate-pop" onClick={e=>e.stopPropagation()}>
                                <div className="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                                    <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <h2 className="text-2xl font-black mb-3 text-gray-900">{t.successMsg}</h2>
                                <p className="text-gray-600 mb-4 leading-relaxed font-bold">{t.successSub}</p>
                                
                                <div className="bg-gray-100 p-4 rounded-lg mb-6 border-2 border-dashed border-gray-300">
                                    <p className="text-sm text-gray-500 mb-1">{t.invoiceNo}</p>
                                    <h3 className="text-2xl font-black text-amazon-orange" dir="ltr">{lastOrderInvoice}</h3>
                                </div>

                                <button onClick={() => setIsSuccessOpen(false)} className="w-full bg-amazon hover:bg-amazon-light text-white py-3 rounded-xl font-bold transition-colors shadow-md text-lg">
                                    {t.backToHome}
                                </button>
                            </div>
                        </div>
                    )}

                    {isContactOpen && (
                        <div className="fixed inset-0 bg-black/70 z-[120] flex justify-center items-center p-4 animate-fade-in no-print" onClick={()=>setIsContactOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-sm overflow-hidden flex flex-col shadow-2xl text-center p-6 animate-pop" onClick={e=>e.stopPropagation()}>
                                <div className="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-green-100">
                                    <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                                </div>
                                <h2 className="text-xl font-black mb-2">{t.contactUs}</h2>
                                <p className="text-gray-500 text-sm mb-6 font-bold">{lang === 'ku' ? 'بۆ پەیوەندیکردن لەگەڵ کادرەکانمان کلیک لەم دوگمەیە بکە:' : (lang === 'en' ? 'Click below to chat with our support team:' : 'للتواصل مع فريق الدعم يرجى النقر على الزر أدناه:')}</p>
                                <a href="https://wa.me/9647800041290" target="_blank" className="w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-lg shadow-green-500/30">
                                    <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                                    WhatsApp
                                </a>
                                <button onClick={()=>setIsContactOpen(false)} className="mt-4 text-gray-400 font-bold underline hover:text-gray-600">{lang === 'en' ? 'Close' : 'داخستن / إغلاق'}</button>
                            </div>
                        </div>
                    )}

                    {isNotifOpen && (
                        <div className="fixed inset-0 bg-black/70 z-[110] flex justify-center items-start pt-20 px-4 animate-fade-in no-print" onClick={()=>setIsNotifOpen(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-md max-h-[70vh] overflow-hidden flex flex-col shadow-2xl" onClick={e=>e.stopPropagation()}>
                                <div className="bg-amazon text-white p-4 flex justify-between items-center font-bold">
                                    <div className="flex items-center gap-2">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                                        <span>{t.notifications}</span>
                                    </div>
                                    <button onClick={()=>setIsNotifOpen(false)} className="text-gray-300 hover:text-white">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                                <div className="overflow-y-auto p-4 space-y-3 bg-gray-50 flex-1 hide-scroll">
                                    {notifications.length === 0 ? <p className="text-center text-gray-500 py-10">{t.noNotif}</p> : 
                                        notifications.map(n => (
                                            <div key={n.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 border-r-4 border-r-blue-500">
                                                <h4 className="font-bold text-lg mb-1 text-gray-900">{n.title}</h4>
                                                <p className="text-gray-700 text-sm mb-2">{n.message}</p>
                                                {n.imageUrl && <img src={n.imageUrl} className="w-full rounded-lg mt-2 object-cover max-h-32 border" />}
                                                <span className="text-xs text-gray-400 mt-2 block">{new Date(n.date).toLocaleDateString()}</span>
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
