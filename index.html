<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KE STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .product-card { transition: all 0.3s ease; border-radius: 24px; overflow: hidden; background: white; border: 1px solid #f1f5f9; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Firebase Config (Updated with your credentials) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDirc0CpBTWr5gxtZQv4ASZv8VRPP2QT90",
            databaseURL: "https://kurdtoolserver-default-rtdb.firebaseio.com/",
            projectId: "kurdtoolserver",
            storageBucket: "kurdtoolserver.appspot.com",
            appId: "1:215346001086:android:aa60f04312d614d29ddaef"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        const SUPER_ADMIN = "kooora.taqana@gmail.com";

        // --- App Component ---
        const App = () => {
            const [page, setPage] = useState('market');
            const [products, setProducts] = useState([]);
            const [user, setUser] = useState(null);
            const [authorizedAdmins, setAuthorizedAdmins] = useState([SUPER_ADMIN]);

            useEffect(() => {
                auth.onAuthStateChanged(u => setUser(u));
                
                // Load Products
                db.ref('products').on('value', (snapshot) => {
                    const data = snapshot.val();
                    const list = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
                    setProducts(list.reverse());
                });

                // Load Authorized Admins
                db.ref('authorized_admins').on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const adminList = Object.values(data);
                        setAuthorizedAdmins([SUPER_ADMIN, ...adminList]);
                    }
                });
            }, []);

            const isSuperAdmin = user?.email === SUPER_ADMIN;
            const isAdmin = user && authorizedAdmins.includes(user.email);

            const handleAddProduct = (p) => {
                if (!isAdmin) return;
                db.ref('products').push({ ...p, createdAt: Date.now() });
                alert("کاڵاکە بە سەرکەوتوویی بڵاوکرایەوە ✅");
            };

            const handleDeleteProduct = (id) => {
                if (window.confirm("دڵنیای لە سڕینەوەی ئەم کاڵایە؟")) {
                    db.ref(`products/${id}`).remove();
                }
            };

            const handleAddAdmin = (email) => {
                if (!isSuperAdmin) return;
                db.ref('authorized_admins').push(email);
                alert("ئەدمین زیادکرا ✅");
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <nav className="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b p-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setPage('market')}>
                                <div className="bg-indigo-600 text-white w-10 h-10 rounded-xl flex items-center justify-center font-bold shadow-lg">KE</div>
                                <span className="text-xl font-extrabold tracking-tighter">KE STORE</span>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={() => setPage('market')} className={`px-5 py-2 rounded-xl text-sm font-bold transition ${page === 'market' ? 'bg-slate-900 text-white' : 'text-slate-500'}`}>فرۆشگا</button>
                                <button onClick={() => setPage('admin')} className={`px-5 py-2 rounded-xl text-sm font-bold transition ${page === 'admin' ? 'bg-slate-900 text-white' : 'text-slate-500'}`}>ئەدمین</button>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-1 max-w-7xl mx-auto w-full p-4">
                        {page === 'market' ? (
                            <section>
                                <div className="text-center py-12">
                                    <h1 className="text-4xl sm:text-6xl font-black mb-4">بەخێربێن بۆ KE STORE</h1>
                                    <p className="text-slate-500 font-medium text-lg">باشترین کاڵاکان بە گونجاوترین نرخ</p>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                    {products.map(p => (
                                        <div key={p.id} className="product-card p-4">
                                            <div className="h-56 bg-slate-100 rounded-2xl mb-4 overflow-hidden">
                                                <img src={p.imageUrl} className="w-full h-full object-cover" onError={(e) => e.target.src='https://via.placeholder.com/400'} />
                                            </div>
                                            <h3 className="font-bold text-lg mb-1">{p.name}</h3>
                                            <p className="text-slate-400 text-sm mb-4 line-clamp-2">{p.description}</p>
                                            <div className="flex justify-between items-center">
                                                <span className="text-xl font-black text-indigo-600">{Number(p.price).toLocaleString()} د.ع</span>
                                                <button className="bg-slate-900 text-white p-2 rounded-lg">🛒</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ) : (
                            <AdminPanel 
                                user={user} 
                                isAdmin={isAdmin} 
                                isSuperAdmin={isSuperAdmin}
                                products={products} 
                                onAdd={handleAddProduct} 
                                onDelete={handleDeleteProduct}
                                onAddAdmin={handleAddAdmin}
                            />
                        )}
                    </main>

                    <footer className="bg-white border-t p-8 text-center mt-20">
                        <p className="text-slate-400 font-bold text-sm">© 2026 KE STORE — هەموو مافەکان پارێزراوە</p>
                    </footer>
                </div>
            );
        };

        const AdminPanel = ({ user, isAdmin, isSuperAdmin, products, onAdd, onDelete, onAddAdmin }) => {
            const [form, setForm] = useState({ name: '', price: '', description: '', imageUrl: '' });
            const [newAdmin, setNewAdmin] = useState('');

            if (!user) return (
                <div className="flex flex-col items-center py-20">
                    <h2 className="text-2xl font-black mb-6">تایبەت بە ئەدمین</h2>
                    <button onClick={() => auth.signInWithPopup(googleProvider)} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg">چوونەژوورەوە لەگەڵ Google</button>
                </div>
            );

            if (!isAdmin) return <div className="text-center py-20 font-bold text-red-500">تۆ مۆڵەتی ئەدمینت نییە</div>;

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 py-10">
                    {/* Add Product */}
                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border">
                        <h2 className="text-2xl font-black mb-6">بڵاوکردنەوەی کاڵا</h2>
                        <form onSubmit={(e) => { e.preventDefault(); onAdd(form); setForm({name:'', price:'', description:'', imageUrl:''}); }} className="space-y-4">
                            <input required placeholder="ناوی کاڵا" className="w-full p-4 bg-slate-50 rounded-2xl outline-none border focus:border-indigo-500 font-bold" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} />
                            <input required type="number" placeholder="نرخ (د.ع)" className="w-full p-4 bg-slate-50 rounded-2xl outline-none border focus:border-indigo-500 font-bold" value={form.price} onChange={e=>setForm({...form, price:e.target.value})} />
                            <input required placeholder="لینکی وێنە (Direct URL)" className="w-full p-4 bg-slate-50 rounded-2xl outline-none border focus:border-indigo-500 font-bold" value={form.imageUrl} onChange={e=>setForm({...form, imageUrl:e.target.value})} />
                            <textarea required placeholder="وەسفی کاڵا" className="w-full p-4 bg-slate-50 rounded-2xl outline-none border focus:border-indigo-500 font-bold h-32" value={form.description} onChange={e=>setForm({...form, description:e.target.value})}></textarea>
                            <button className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-indigo-700 transition">بڵاوکردنەوە</button>
                        </form>
                    </div>

                    {/* Manage Section */}
                    <div className="space-y-6">
                        {isSuperAdmin && (
                            <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                                <h3 className="font-black mb-4">زیادکردنی ئەدمینی نوێ</h3>
                                <div className="flex gap-2">
                                    <input placeholder="Email..." className="flex-1 p-3 bg-slate-50 rounded-xl border outline-none font-bold" value={newAdmin} onChange={e=>setNewAdmin(e.target.value)} />
                                    <button onClick={() => {onAddAdmin(newAdmin); setNewAdmin('');}} className="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold">زیادکردن</button>
                                </div>
                            </div>
                        )}
                        <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                            <h3 className="font-black mb-4 text-xl">لیستی کاڵاکان ({products.length})</h3>
                            <div className="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                                {products.map(p => (
                                    <div key={p.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-2xl border">
                                        <div className="flex items-center gap-3">
                                            <img src={p.imageUrl} className="w-12 h-12 rounded-lg object-cover" />
                                            <div>
                                                <div className="font-bold text-sm">{p.name}</div>
                                                <div className="text-indigo-600 text-xs font-black">{Number(p.price).toLocaleString()} د.ع</div>
                                            </div>
                                        </div>
                                        <button onClick={() => onDelete(p.id)} className="text-red-500 p-2">🗑️</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
